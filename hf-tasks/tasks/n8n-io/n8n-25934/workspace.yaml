\t\tuserId,\n+\t\t\t\tmessages: mapChatMessagesToStoredMessages(data.messages),\n+\t\t\t\tpreviousSummary: data.previousSummary ?? null,\n+\t\t\t},\n+\t\t\t['workflowId', 'userId'],\n+\t\t);\n+\t}\n+\n+\tasync deleteSession(threadId: string): Promise<void> {\n+\t\tconst { workflowId, userId } = this.parseThreadId(threadId);\n+\t\tawait this.delete({ workflowId, userId });\n+\t}\n+\n+\tprivate parseThreadId(threadId: string): { workflowId: string; userId: string } {\n+\t\t// Format: \"workflow-{workflowId}-user-{userId}\"\n+\t\tconst match = threadId.match(/^workflow-(.+)-user-(.+)$/);\n+\t\tif (!match) {\n+\t\t\tthrow new Error(`Invalid thread ID format: ${threadId}`);\n+\t\t}\n+\t\treturn { workflowId: match[1], userId: match[2] };\n+\t}\n+}\ndiff --git a/packages/cli/src/modules/workflow-builder/workflow-builder.module.ts b/packages/cli/src/modules/workflow-builder/workflow-builder.module.ts\nnew file mode 100644\nindex 0000000000..8808db9bd9\n--- /dev/null\n+++ b/packages/cli/src/modules/workflow-builder/workflow-builder.module.ts\n@@ -0,0 +1,10 @@\n+import type { ModuleInterface } from '@n8n/decorators';\n+import { BackendModule } from '@n8n/decorators';\n+\n+@BackendModule({ name: 'workflow-builder', instanceTypes: ['main'] })\n+export class WorkflowBuilderModule implements ModuleInterface {\n+\tasync entities() {\n+\t\tconst { WorkflowBuilderSession } = await import('./workflow-builder-session.entity');\n+\t\treturn [WorkflowBuilderSession];\n+\t}\n+}\ndiff --git a/packages/cli/src/public-api/types.ts b/packages/cli/src/public-api/types.ts\nindex 2c76a0fc94..febe8e2893 100644\n--- a/packages/cli/src/public-api/types.ts\n+++ b/packages/cli/src/public-api/types.ts\n@@ -42,6 +42,17 @@ export declare namespace ExecutionRequest {\n \ttype Get = AuthenticatedRequest<{ id: string }, {}, {}, { includeData?: boolean }>;\n \ttype Delete = Get;\n \ttype Retry = AuthenticatedRequest<{ id: string }, {}, { loadWorkflow?: boolean }, {}>;\n+\ttype Stop = AuthenticatedRequest<