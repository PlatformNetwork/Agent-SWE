gs.suite,\n+\t\t\tmetadata: { ...buildCIMetadata(), subgraph },\n+\t\t\tlogger,\n+\t\t});\n+\t}\n+}\n+\n /**\n  * Main entry point for v2 evaluation CLI.\n  */\n@@ -368,6 +471,7 @@ export async function runV2Evaluation(): Promise<void> {\n \n \t// Setup environment with per-stage model configuration\n \tconst logger = createLogger(args.verbose);\n+\tconst lifecycle = createConsoleLifecycle({ verbose: args.verbose, logger });\n \tconst stageModels = argsToStageModels(args);\n \tconst env = await setupTestEnvironment(stageModels, logger);\n \n@@ -376,6 +480,12 @@ export async function runV2Evaluation(): Promise<void> {\n \t\tthrow new Error('LangSmith client not initialized - check LANGSMITH_API_KEY');\n \t}\n \n+\t// Subgraph evaluation mode\n+\tif (args.subgraph) {\n+\t\tawait handleSubgraphMode(args, env, lifecycle, logger);\n+\t\tprocess.exit(0);\n+\t}\n+\n \t// Create workflow generator based on agent type\n \tconst generateWorkflow =\n \t\targs.agent === AGENT_TYPES.CODE_BUILDER\ndiff --git a/packages/@n8n/ai-workflow-builder.ee/evaluations/evaluators/index.ts b/packages/@n8n/ai-workflow-builder.ee/evaluations/evaluators/index.ts\nindex 0b89eb36e3..244448c996 100644\n--- a/packages/@n8n/ai-workflow-builder.ee/evaluations/evaluators/index.ts\n+++ b/packages/@n8n/ai-workflow-builder.ee/evaluations/evaluators/index.ts\n@@ -15,4 +15,8 @@ export {\n \tcreateSimilarityEvaluator,\n \ttype SimilarityEvaluatorOptions,\n } from './similarity';\n+export {\n+\tcreateResponderEvaluator,\n+\ttype ResponderEvaluationContext,\n+} from './responder';\n export { createExecutionEvaluator } from './execution';\ndiff --git a/packages/@n8n/ai-workflow-builder.ee/evaluations/evaluators/responder/index.ts b/packages/@n8n/ai-workflow-builder.ee/evaluations/evaluators/responder/index.ts\nnew file mode 100644\nindex 0000000000..b8b6db2524\n--- /dev/null\n+++ b/packages/@n8n/ai-workflow-builder.ee/evaluations/evaluators/responder/index.ts\n@@ -0,0 +1,196 @@\n+import type { BaseChatModel } 