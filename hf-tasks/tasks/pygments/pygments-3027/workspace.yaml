patch: "diff --git a/CHANGES b/CHANGES\nindex b914fd13..3e8c8ce5 100644\n--- a/CHANGES\n+++ b/CHANGES\n@@ -16,6 +16,7 @@ Version 2.20.0\n   * LESS: Support single-line comments (#3005)\n   * LilyPond: Update to 2.25.29 (#2974)\n   * Python: Add ``t``-string support (#3009, #3010)\n+  * TOML: Support TOML 1.1.0 (#3026)\n \n - Drop Python 3.8, and add Python 3.14 as a supported version (#2987, #3012)\n \ndiff --git a/pygments/formatters/terminal256.py b/pygments/formatters/terminal256.py\nindex 2504b4ae..81b420a8 100644\n--- a/pygments/formatters/terminal256.py\n+++ b/pygments/formatters/terminal256.py\n@@ -169,19 +169,19 @@ class Terminal256Formatter(Formatter):\n         self.xterm_colors.append((0x00, 0xff, 0xff))  # 14\n         self.xterm_colors.append((0xff, 0xff, 0xff))  # 15\n \n-        # colors 16..232: the 6x6x6 color cube\n+        # colors 16..231: the 6x6x6 color cube\n \n         valuerange = (0x00, 0x5f, 0x87, 0xaf, 0xd7, 0xff)\n \n-        for i in range(217):\n+        for i in range(216):\n             r = valuerange[(i // 36) % 6]\n             g = valuerange[(i // 6) % 6]\n             b = valuerange[i % 6]\n             self.xterm_colors.append((r, g, b))\n \n-        # colors 233..253: grayscale\n+        # colors 232..255: grayscale\n \n-        for i in range(1, 22):\n+        for i in range(24):\n             v = 8 + i * 10\n             self.xterm_colors.append((v, v, v))\n \n@@ -189,7 +189,7 @@ class Terminal256Formatter(Formatter):\n         distance = 257*257*3  # \"infinity\" (>distance from #000000 to #ffffff)\n         match = 0\n \n-        for i in range(0, 254):\n+        for i in range(0, 256):\n             values = self.xterm_colors[i]\n \n             rd = r - values[0]\ndiff --git a/pygments/lexers/configs.py b/pygments/lexers/configs.py\nindex 5e7f47b6..71079134 100644\n--- a/pygments/lexers/configs.py\n+++ b/pygments/lexers/configs.py\n@@ -1127,7 +1127,7 @@ class TOMLLexer(RegexLexer):\n     # Based on the TOML spec: https://toml.io/en/v1.0.0\n \n     # The following is adapted from CPython's tomllib:\n-    _time = r\"\\d\\d:\\d\\d:\\d\\d(\\.\\d+)?\"\n+    _time = r\"\\d\\d:\\d\\d(:\\d\\d(\\.\\d+)?)?\"\n     _datetime = rf\"\"\"(?x)\n                   \\d\\d\\d\\d-\\d\\d-\\d\\d # date, e.g., 1988-10-27\n                 (\n@@ -1238,9 +1238,9 @@ class TOMLLexer(RegexLexer):\n             default('value'),\n         ],\n         'inline-table': [\n-            # Note that unlike inline arrays, inline tables do not\n-            # allow newlines or comments.\n-            (r'[ \\t]+', Whitespace),\n+            # Whitespace (since TOML 1.1.0, same as in array)\n+            (r'\\s+', Whitespace),\n+            (r'#.*', Comment.Single),\n \n             # Keys\n             include('key'),\n@@ -1275,7 +1275,7 @@ class TOMLLexer(RegexLexer):\n             (r\"'\", String.Single),\n         ],\n         'escapes': [\n-            (r'\\\\u[0-9a-fA-F]{4}|\\\\U[0-9a-fA-F]{8}', String.Escape),\n+            (r'\\\\x[0-9a-fA-F]{2}|\\\\u[0-9a-fA-F]{4}|\\\\U[0-9a-fA-F]{8}', String.Escape),\n             (r'\\\\.', String.Escape),\n         ],\n     }\ndiff --git a/pygments/util.py b/pygments/util.py\nindex 71c5710a..f6c80246 100644\n--- a/pygments/util.py\n+++ b/pygments/util.py\n@@ -286,7 +286,7 @@ def guess_decode(text):\n         try:\n             import locale\n             prefencoding = locale.getpreferredencoding()\n-            text = text.decode()\n+            text = text.decode(prefencoding)\n             return text, prefencoding\n         except (UnicodeDecodeError, LookupError):\n             text = text.decode('latin1')\ndiff --git a/tests/snippets/toml/toml-1.1.0.txt b/tests/snippets/toml/toml-1.1.0.txt\nnew file mode 100644\nindex 00000000..987e5815\n--- /dev/null\n+++ b/tests/snippets/toml/toml-1.1.0.txt\n@@ -0,0 +1,93 @@\n+---input---\n+[\"toml 1.1.0 features\"]\n+tbl = {\n+   key      = \"a string\",\n+   moar-tbl =  {\n+      key = 1,\n+   },\n+}\n+\n+null = \"null byte: \\x00