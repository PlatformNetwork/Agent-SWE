prompt: Enable opting into virtual threads for the library’s background work instead of platform threads. Provide a configurable option (analogous to the existing thread-usage setting) on relevant client objects so users can select virtual threads when running on compatible Java versions, while remaining compatible with older Java runtimes. Specify that behavior should fall back appropriately when virtual threads are unavailable.
original_pr_body: "IBM/JTOpen (#310): Virtual threads\n\nHi, with this PR it will be possible to use virtual threads instead of platform threads.\r\nThe threads are instantiated using reflection so the change is compatible with versions of Java < 19.\r\n\r\nThis setting can be specified similarly to useThread with the virtualThreads property on a Datasource, AS400 object etc."
