  test_files: '[{"path":"tests/ws_port_fixed.test.js","content":"const assert = require(\"assert\");\nconst WebSocket = require(\"ws\");\nconst ProxyServerSystem = require(\"../src/core/ProxyServerSystem\");\n\nconst originalWsPort = process.env.WS_PORT;\nconst originalPort = process.env.PORT;\n\nconst connectWebSocket = (url, timeoutMs = 2000) =>\n    new Promise((resolve, reject) => {\n        const ws = new WebSocket(url);\n        const timer = setTimeout(() => {\n            ws.terminate();\n            reject(new Error(\"timeout\"));\n        }, timeoutMs);\n\n        ws.on(\"open\", () => {\n            clearTimeout(timer);\n            ws.close();\n            resolve(true);\n        });\n        ws.on(\"error\", err => {\n            clearTimeout(timer);\n            ws.close();\n            reject(err);\n        });\n    });\n\n(async () => {\n    let system;\n    try {\n        process.env.WS_PORT = \"12345\";\n        process.env.PORT = \"9012\";\n\n        system = new ProxyServerSystem();\n        await system._startWebSocketServer();\n\n        assert.strictEqual(\n            system.config.wsPort,\n            9998,\n            \"WS_PORT environment variable should be ignored and always use port 9998\"\n        );\n        assert.strictEqual(\n            system.config.httpPort,\n            9012,\n            \"PORT environment variable should still be honored for HTTP server port\"\n        );\n\n        await connectWebSocket(\"ws://127.0.0.1:9998\");\n\n        let failed = false;\n        try {\n            await connectWebSocket(\"ws://127.0.0.1:12345\", 750);\n        } catch (error) {\n            failed = true;\n        }\n        assert.strictEqual(\n            failed,\n            true,\n            \"WebSocket server should not listen on overridden WS_PORT\"\n        );\n    } finally {\n        if (system && system.wsServer) {\n            system.wsServer.close();\n        }\n        if (originalWsPort === undefined) {\n            delete process.env.WS_PORT;\n        } else {\n            process.env.WS_PORT = originalWsPort;\n        }\n        if (originalPort === undefined) {\n            delete process.env.PORT;\n        } else {\n            process.env.PORT = originalPort;\n        }\n    }\n})().catch(err => {\n    console.error(err);\n    process.exit(1);\n});\n"},{"path":"tests/build_script_ws_port_fixed.test.js","content":"const assert = require(\"assert\");\nconst ConfigLoader = require(\"../src/utils/ConfigLoader\");\n\nconst originalWsPort = process.env.WS_PORT;\n\ntry {\n    process.env.WS_PORT = \"7890\";\n\n    const logger = {\n        info: () => {},\n        warn: () => {},\n        error: () => {},\n    };\n\n    const loader = new ConfigLoader(logger);\n    const config = loader.loadConfiguration();\n\n    assert.strictEqual(\n        config.wsPort,\n        9998,\n        \"ConfigLoader should ignore WS_PORT and keep the fixed websocket port\"\n    );\n} finally {\n    if (originalWsPort === undefined) {\n        delete process.env.WS_PORT;\n    } else {\n        process.env.WS_PORT = originalWsPort;\n    }\n}\n"},{"path":"tests/ws_port_ws_server_fixed.test.js","content":"const assert = require(\"assert\");\nconst WebSocket = require(\"ws\");\n\nconst originalWsPort = process.env.WS_PORT;\n\nconst connectWebSocket = (url, timeoutMs = 2000) =>\n    new Promise((resolve, reject) => {\n        const ws = new WebSocket(url);\n        const timer = setTimeout(() => {\n            ws.terminate();\n            reject(new Error(\"timeout\"));\n        }, timeoutMs);\n\n        ws.on(\"open\", () => {\n            clearTimeout(timer);\n            ws.close();\n            resolve(true);\n        });\n        ws.on(\"error\", err => {\n            clearTimeout(timer);\n            ws.close();\n            reject(err);\n        });\n    });\n\n(async () => {\n    let system;\n    try {\n        process.env.WS_PORT = \"45678\";\n        const ProxyServerSystem = require(\"../src/core/ProxyServerSystem\");\n        system = new ProxyServerSystem();\n\n        await system._startWebSocketServer();\n\n        assert.strictEqual(\n            system.config.wsPort,\n            9998,\n            \"WebSocket server should always start on port 9998\"\n        );\n\n        await connectWebSocket(\"ws://127.0.0.1:9998\");\n\n        let failed = false;\n        try {\n            await connectWebSocket(\"ws://127.0.0.1:45678\", 750);\n        } catch (error) {\n            failed = true;\n        }\n\n        assert.strictEqual(\n            failed,\n            true,\n            \"WebSocket server should not listen on the WS_PORT environment override\"\n        );\n    } finally {\n        if (system && system.wsServer) {\n            system.wsServer.close();\n        }\n        if (originalWsPort === undefined) {\n            delete process.env.WS_PORT;\n        } else {\n            process.env.WS_PORT = originalWsPort;\n        }\n    }\n})().catch(err => {\n    console.error(err);\n    process.exit(1);\n});\n"}]'
