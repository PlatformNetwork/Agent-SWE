patch: "diff --git a/.jules/refactor.md b/.jules/refactor.md\nnew file mode 100644\nindex 0000000..2c2b4e6\n--- /dev/null\n+++ b/.jules/refactor.md\n@@ -0,0 +1,8 @@\n+# Refactor Journal\n+\n+This journal tracks critical learnings and major refactoring decisions.\n+\n+## 2026-02-20 - Initial Setup\n+- Created refactor journal.\n+- Refactored `convex/users.ts` to consolidate parallel project counting logic into `countByProjectParallel` helper.\n+- Learned: When extracting helpers for \"fast path\" optimizations, ensure that clamping logic (e.g. `Math.min`) is applied at the appropriate level (per-project vs global) to preserve exact behavior.\ndiff --git a/convex/authWrapper.ts b/convex/authWrapper.ts\nindex d5973bd..200206d 100644\n--- a/convex/authWrapper.ts\n+++ b/convex/authWrapper.ts\n@@ -19,32 +19,42 @@ import { logger } from \"./lib/logger\";\n import { getClientIp } from \"./lib/ssrf\";\n import { rateLimit } from \"./rateLimits\";\n \n+/**\n+ * Handler for password reset request - exported for testing\n+ */\n+export const performPasswordResetHandler = async (_ctx: ActionCtx, args: { email: string }) => {\n+  try {\n+    const formData = new URLSearchParams();\n+    formData.set(\"email\", args.email);\n+    formData.set(\"flow\", \"reset\");\n+\n+    // Use the backend URL (CONVEX_SITE_URL) directly to avoid frontend proxy issues\n+    // and circular dependencies with api.auth\n+    const response = await fetch(`${getConvexSiteUrl()}/api/auth/signin/password`, {\n+      method: \"POST\",\n+      headers: {\n+        \"Content-Type\": \"application/x-www-form-urlencoded\",\n+      },\n+      body: formData.toString(),\n+    });\n+\n+    if (!response.ok) {\n+      const text = await response.text();\n+      throw new Error(`Auth endpoint returned ${response.status}: ${text}`);\n+    }\n+  } catch (error) {\n+    // Silently ignore to client - don't leak any info\n+    // But log to server for debugging (e.g. timeout in CI)\n+    logger.error(\"Password reset request failed\", { error });\n+  }\n+};\n+\n /**\n  * Internal action to perform the actual password reset request (can be slow)\n  */\n export const performPasswordReset = internalAction({\n   args: { email: v.string() },\n-  handler: async (_ctx, args) => {\n-    try {\n-      const formData = new URLSearchParams();\n-      formData.set(\"email\", args.email);\n-      formData.set(\"flow\", \"reset\");\n-\n-      // Use the backend URL (CONVEX_SITE_URL) directly to avoid frontend proxy issues\n-      // and circular dependencies with api.auth\n-      await fetch(`${getConvexSiteUrl()}/api/auth/signin/password`, {\n-        method: \"POST\",\n-        headers: {\n-          \"Content-Type\": \"application/x-www-form-urlencoded\",\n-        },\n-        body: formData.toString(),\n-      });\n-    } catch (error) {\n-      // Silently ignore to client - don't leak any info\n-      // But log to server for debugging (e.g. timeout in CI)\n-      logger.error(\"Password reset request failed\", { error });\n-    }\n-  },\n+  handler: performPasswordResetHandler,\n });\n \n /**\ndiff --git a/convex/authWrapperSecure.test.ts b/convex/authWrapperSecure.test.ts\nnew file mode 100644\nindex 0000000..8a9453f\n--- /dev/null\n+++ b/convex/authWrapperSecure.test.ts\n@@ -0,0 +1,58 @@\n+import { beforeEach, describe, expect, it, vi } from \"vitest\";\n+import { performPasswordResetHandler } from \"./authWrapper\";\n+import { logger } from \"./lib/logger\";\n+\n+// Mock logger\n+vi.mock(\"./lib/logger\", () => ({\n+  logger: {\n+    error: vi.fn(),\n+  },\n+}));\n+\n+// Mock getConvexSiteUrl\n+vi.mock(\"./lib/env\", () => ({\n+  getConvexSiteUrl: () => \"https://example.com\",\n+}));\n+\n+describe(\"performPasswordResetHandler\", () => {\n+  beforeEach(() => {\n+    vi.clearAllMocks();\n+  });\n+\n+  it(\"should log error if fetch returns non-200 status\", async () => {\n+    // Mock global fetch\n+    global.fetch = vi.fn().mockResolvedValue({\n+      ok: false,\n+      status: 500,\n+      text: () => Promise.resolve(\"Internal Server Error\"),\n+    });\n+\n+    const mockCtx = {} as any;\n+    const args = { email: \"test@example.com\" };\n+\n+    await performPasswordResetHandler(mockCtx, args);\n+\n+    expect(logger.error).toHaveBeenCalledWith(\n+      \"Password reset request failed\",\n+      expect.objectContaining({\n+        error: expect.objectContaining({\n+          message: \"Auth endpoint returned 500: Internal Server Error\",\n+        }),\n+      }),\n+    );\n+  });\n+\n+  it(\"should succeed if fetch returns 200\", async () => {\n+    global.fetch = vi.fn().mockResolvedValue({\n+      ok: true,\n+      status: 200,\n+    });\n+\n+    const mockCtx = {} as any;\n+    const args = { email: \"test@example.com\" };\n+\n+    await performPasswordResetHandler(mockCtx, args);\n+\n+    expect(logger.error).not.toHaveBeenCalled();\n+  });\n+});\ndiff --git a/convex/lib/boundedQueries.ts b/convex/lib/boundedQueries.ts\nindex 247b126..f5d2c5e 100644\n--- a/convex/lib/boundedQueries.ts\n+++ b/convex/lib/boundedQueries.ts\n@@ -98,12 +98,12 @@ export interface BoundedFilterOptions<T> {\n // =============================================================================\n \n /** Minimal query interface for bounded helpers */\n-interface TakeableQuery<T> {\n+export interface TakeableQuery<T> {\n   take(n: number): Promise<T[]>;\n }\n \n /** Minimal query interface for count (to handle both library and test environments) */\n-interface CountableQuery<T> extends TakeableQuery<T> {\n+export interface CountableQuery<T> extends TakeableQuery<T> {\n   count?: () => Promise<number>;\n }\n \ndiff --git a/convex/meetingBot.ts b/convex/meetingBot.ts\nindex 3f199e1..e73424a 100644\n--- a/convex/meetingBot.ts\n+++ b/convex/meetingBot.ts\n@@ -91,43 +91,30 @@ export const listRecordings = authenticatedQuery({\n     const calendarEventIds = recordings\n       .map((r) => r.calendarEventId)\n       .filter((id): id is Id<\"calendarEvents\"> => !!id);\n-    const recordingIds = recordings.map((r) => r._id);\n-\n-    // Parallel fetch: calendar events, transcripts, summaries\n-    const [calendarEventMap, allTranscripts, allSummaries] = await Promise.all([\n-      batchFetchCalendarEvents(ctx, calendarEventIds),\n-      Promise.all(\n-        recordingIds.map((recordingId) =>\n-          ctx.db\n-            .query(\"meetingTranscripts\")\n-            .withIndex(\"by_recording\", (q) => q.eq(\"recordingId\", recordingId))\n-            .first(),\n-        ),\n-      ),\n-      Promise.all(\n-        recordingIds.map((recordingId) =>\n-          ctx.db\n-            .query(\"meetingSummaries\")\n-            .withIndex(\"by_recording\", (q) => q.eq(\"recordingId\", recordingId))\n-            .first(),\n-        ),\n-      ),\n-    ]);\n \n-    // Build lookup maps\n-    const transcriptMap = new Map(recordingIds.map((id, i) => [id.toString(), allTranscripts[i]]));\n-    const summaryMap = new Map(recordingIds.map((id, i) => [id.toString(), allSummaries[i]]));\n+    // Parallel fetch: calendar events\n+    const calendarEventMap = await batchFetchCalendarEvents(ctx, calendarEventIds);\n \n     // Enrich with pre-fetched data (no N+1 - all fetches are parallel)\n-    return recordings.map((recording) => ({\n-      ...recording,\n-      createdAt: recording._creationTime,\n-      calendarEvent: recording.calendarEventId\n-        ? (calendarEventMap.get(recording.calendarEventId) ?? null)\n-        : null,\n-      hasTranscript: !!transcriptMap.get(recording._id.toString()),\n-      hasSummary: !!summaryMap.get(recording._id.toString()),\n-    }));\n+    return recordings.map((recording) => {\n+      // Optimization: Deduce existence from status to avoid fetching large docs\n+      // Statuses \"summarizing\" and \"completed\" imply a transcript exists.\n+      // Status \"completed\" implies a summary exists.\n+      // For \"failed\" status, we default to false even if partial data might exist,\n+      // as users should view details for failed items.\n+      const hasTranscript = recording.status === \"summarizing\" || recording.status === \"completed\";\n+      const hasSummary = recording.status === \"completed\";\n+\n+      return {\n+        ...recording,\n+        createdAt: recording._creationTime,\n+        calendarEvent: recording.calendarEventId\n+          ? (calendarEventMap.get(recording.calendarEventId) ?? null)\n+          : null,\n+        hasTranscript,\n+        hasSummary,\n+      };\n+    });\n   },\n });\n \ndiff --git a/convex/meetingBotPerf.test.ts b/convex/meetingBotPerf.test.ts\nnew file mode 100644\nindex 0000000..e60f7f6\n--- /dev/null\n+++ b/convex/meetingBotPerf.test.ts\n@@ -0,0 +1,160 @@\n+import { convexTest } from \"convex-test\";\n+import { describe, expect, it } from \"vitest\";\n+import { api } from \"./_generated/api\";\n+import schema from \"./schema\";\n+import { modules } from \"./testSetup.test-helper\";\n+import { createTestContext } from \"./testUtils\";\n+\n+describe(\"MeetingBot Performance\", () => {\n+  it(\"listRecordings correctly sets flags based on status without fetching heavy data\", async () => {\n+    const t = convexTest(schema, modules);\n+    const { asUser, userId } = await createTestContext(t);\n+\n+    // Create recordings in various states\n+    // 1. Scheduled (no transcript, no summary)\n+    await t.run(async (ctx) => {\n+      await ctx.db.insert(\"meetingRecordings\", {\n+        meetingUrl: \"https://zoom.us/j/1\",\n+        meetingPlatform: \"zoom\",\n+        title: \"Scheduled Meeting\",\n+        status: \"scheduled\",\n+        botName: \"Bot\",\n+        createdBy: userId,\n+        isPublic: false,\n+        updatedAt: Date.now(),\n+      });\n+    });\n+\n+    // 2. Summarizing (has transcript, no summary)\n+    await t.run(async (ctx) => {\n+      const recordingId = await ctx.db.insert(\"meetingRecordings\", {\n+        meetingUrl: \"https://zoom.us/j/2\",\n+        meetingPlatform: \"zoom\",\n+        title: \"Summarizing Meeting\",\n+        status: \"summarizing\",\n+        botName: \"Bot\",\n+        createdBy: userId,\n+        isPublic: false,\n+        updatedAt: Date.now(),\n+      });\n+      // Insert transcript to mimic real flow (though optimization won't check it)\n+      await ctx.db.insert(\"meetingTranscripts\", {\n+        recordingId,\n+        fullText: \"Some transcript text...\",\n+        segments: [],\n+        language: \"en\",\n+        modelUsed: \"whisper\",\n+        wordCount: 100,\n+      });\n+    });\n+\n+    // 3. Completed (has transcript, has summary)\n+    await t.run(async (ctx) => {\n+      const recordingId = await ctx.db.insert(\"meetingRecordings\", {\n+        meetingUrl: \"https://zoom.us/j/3\",\n+        meetingPlatform: \"zoom\",\n+        title: \"Completed Meeting\",\n+        status: \"completed\",\n+        botName: \"Bot\",\n+        createdBy: userId,\n+        isPublic: false,\n+        updatedAt: Date.now(),\n+      });\n+      // Insert transcript\n+      const transcriptId = await ctx.db.insert(\"meetingTranscripts\", {\n+        recordingId,\n+        fullText: \"Some transcript text...\",\n+        segments: [],\n+        language: \"en\",\n+        modelUsed: \"whisper\",\n+        wordCount: 100,\n+      });\n+      // Insert summary\n+      await ctx.db.insert(\"meetingSummaries\", {\n+        recordingId,\n+        transcriptId,\n+        executiveSummary: \"Summary...\",\n+        keyPoints: [],\n+        actionItems: [],\n+        decisions: [],\n+        openQuestions: [],\n+        topics: [],\n+        modelUsed: \"gpt-4\",\n+      });\n+    });\n+\n+    // 4. Failed (no transcript, no summary - standard assumption)\n+    await t.run(async (ctx) => {\n+      await ctx.db.insert(\"meetingRecordings\", {\n+        meetingUrl: \"https://zoom.us/j/4\",\n+        meetingPlatform: \"zoom\",\n+        title: \"Failed Meeting\",\n+        status: \"failed\",\n+        botName: \"Bot\",\n+        createdBy: userId,\n+        isPublic: false,\n+        updatedAt: Date.now(),\n+        errorMessage: \"Something went wrong\",\n+      });\n+    });\n+\n+    // Call listRecordings\n+    const recordings = await asUser.query(api.meetingBot.listRecordings, {});\n+\n+    // Verify\n+    expect(recordings).toHaveLength(4);\n+\n+    const scheduled = recordings.find((r) => r.status === \"scheduled\");\n+    expect(scheduled).toBeDefined();\n+    expect(scheduled?.hasTranscript).toBe(false);\n+    expect(scheduled?.hasSummary).toBe(false);\n+\n+    const summarizing = recordings.find((r) => r.status === \"summarizing\");\n+    expect(summarizing).toBeDefined();\n+    // In current implementation (before fix), this should be true because we inserted transcript\n+    expect(summarizing?.hasTranscript).toBe(true);\n+    expect(summarizing?.hasSummary).toBe(false);\n+\n+    const completed = recordings.find((r) => r.status === \"completed\");\n+    expect(completed).toBeDefined();\n+    // In current implementation (before fix), this should be true because we inserted transcript and summary\n+    expect(completed?.hasTranscript).toBe(true);\n+    expect(completed?.hasSummary).toBe(true);\n+\n+    const failed = recordings.find((r) => r.status === \"failed\");\n+    expect(failed).toBeDefined();\n+    expect(failed?.hasTranscript).toBe(false);\n+    expect(failed?.hasSummary).toBe(false);\n+\n+    // 5. Failed but has transcript (e.g. failed during summary)\n+    await t.run(async (ctx) => {\n+      const recordingId = await ctx.db.insert(\"meetingRecordings\", {\n+        meetingUrl: \"https://zoom.us/j/5\",\n+        meetingPlatform: \"zoom\",\n+        title: \"Failed during Summary\",\n+        status: \"failed\",\n+        botName: \"Bot\",\n+        createdBy: userId,\n+        isPublic: false,\n+        updatedAt: Date.now(),\n+        errorMessage: \"Summary generation failed\",\n+      });\n+      // Insert transcript\n+      await ctx.db.insert(\"meetingTranscripts\", {\n+        recordingId,\n+        fullText: \"Some transcript text...\",\n+        segments: [],\n+        language: \"en\",\n+        modelUsed: \"whisper\",\n+        wordCount: 100,\n+      });\n+    });\n+\n+    // Call listRecordings again\n+    const recordings2 = await asUser.query(api.meetingBot.listRecordings, {});\n+    const failedWithTranscript = recordings2.find((r) => r.title === \"Failed during Summary\");\n+    expect(failedWithTranscript).toBeDefined();\n+    // New behavior: false because status is 'failed', avoiding DB lookup\n+    expect(failedWithTranscript?.hasTranscript).toBe(false);\n+  });\n+});\ndiff --git a/convex/purge.test.ts b/convex/purge.test.ts\nnew file mode 100644\nindex 0000000..8d61566\n--- /dev/null\n+++ b/convex/purge.test.ts\n@@ -0,0 +1,98 @@\n+import { convexTest } from \"convex-test\";\n+import { describe, expect, it } from \"vitest\";\n+import { internal } from \"./_generated/api\";\n+import { TABLES } from \"./purge\";\n+import schema from \"./schema\";\n+import { modules } from \"./testSetup.test-helper\";\n+\n+describe(\"Purge Data\", () => {\n+  it(\"should fail if not confirmed\", async () => {\n+    const t = convexTest(schema, modules);\n+    await expect(t.mutation(internal.purge.purgeData, { confirm: false })).rejects.toThrow(\n+      \"Confirmation required\",\n+    );\n+  });\n+\n+  it(\"should delete all data from known tables\", async () => {\n+    const t = convexTest(schema, modules);\n+\n+    // Insert some data\n+    await t.run(async (ctx) => {\n+      const userId = await ctx.db.insert(\"users\", {\n+        name: \"Test User\",\n+        email: \"test@example.com\",\n+      });\n+      const orgId = await ctx.db.insert(\"organizations\", {\n+        name: \"Test Org\",\n+        slug: \"test\",\n+        timezone: \"UTC\",\n+        settings: {\n+          defaultMaxHoursPerWeek: 40,\n+          defaultMaxHoursPerDay: 8,\n+          requiresTimeApproval: false,\n+          billingEnabled: false,\n+        },\n+        createdBy: userId,\n+        updatedAt: Date.now(),\n+      });\n+      const workspaceId = await ctx.db.insert(\"workspaces\", {\n+        name: \"Test Workspace\",\n+        slug: \"test-workspace\",\n+        organizationId: orgId,\n+        createdBy: userId,\n+        updatedAt: Date.now(),\n+      });\n+      await ctx.db.insert(\"projects\", {\n+        name: \"Test Project\",\n+        key: \"TEST\",\n+        createdBy: userId,\n+        organizationId: orgId,\n+        updatedAt: Date.now(),\n+        // biome-ignore lint/style/noNonNullAssertion: testing convenience\n+        ownerId: userId!,\n+        isPublic: false,\n+        boardType: \"kanban\",\n+        workflowStates: [],\n+        workspaceId: workspaceId,\n+      });\n+      await ctx.db.insert(\"auditLogs\", {\n+        action: \"test\",\n+        targetId: \"1\",\n+        targetType: \"test\",\n+        timestamp: Date.now(),\n+      });\n+    });\n+\n+    // Verify data exists\n+    await t.run(async (ctx) => {\n+      expect((await ctx.db.query(\"users\").collect()).length).toBe(1);\n+      expect((await ctx.db.query(\"projects\").collect()).length).toBe(1);\n+      expect((await ctx.db.query(\"auditLogs\").collect()).length).toBe(1);\n+    });\n+\n+    // Purge\n+    await t.mutation(internal.purge.purgeData, { confirm: true });\n+\n+    // Verify data is gone\n+    await t.run(async (ctx) => {\n+      expect((await ctx.db.query(\"users\").collect()).length).toBe(0);\n+      expect((await ctx.db.query(\"projects\").collect()).length).toBe(0);\n+      expect((await ctx.db.query(\"auditLogs\").collect()).length).toBe(0);\n+    });\n+  });\n+\n+  it(\"should cover all schema tables\", () => {\n+    // biome-ignore lint/suspicious/noExplicitAny: convenient access to private property\n+    const schemaTables = Object.keys((schema as any).tables);\n+    // @ts-expect-error - convenient access\n+    const missingTables = schemaTables.filter((table) => !TABLES.includes(table));\n+\n+    if (missingTables.length > 0) {\n+      console.error(\"Missing tables in purge list:\", missingTables);\n+      console.error(\"Tables in purge list:\", TABLES);\n+      console.error(\"Schema tables:\", schemaTables);\n+    }\n+\n+    expect(missingTables).toEqual([]);\n+  });\n+});\ndiff --git a/convex/purge.ts b/convex/purge.ts\nindex 732bedf..0f02f7b 100644\n--- a/convex/purge.ts\n+++ b/convex/purge.ts\n@@ -3,21 +3,29 @@ import type { TableNames } from \"./_generated/dataModel\";\n import { internalMutation } from \"./_generated/server\";\n import { validation } from \"./lib/errors\";\n \n-const TABLES: TableNames[] = [\n+export const TABLES: TableNames[] = [\n   \"documents\",\n   \"documentVersions\",\n   \"documentTemplates\",\n+  \"yjsDocuments\",\n+  \"yjsAwareness\",\n   \"workspaces\",\n+  \"workspaceMembers\",\n   \"projects\",\n   \"projectMembers\",\n   \"issues\",\n   \"issueComments\",\n+  \"issueCommentReactions\",\n+  \"documentComments\",\n+  \"documentCommentReactions\",\n   \"issueLinks\",\n   \"sprints\",\n   \"issueActivity\",\n   \"issueWatchers\",\n+  \"labelGroups\",\n   \"labels\",\n   \"issueTemplates\",\n+  \"inboxIssues\",\n   \"webhooks\",\n   \"webhookExecutions\",\n   \"savedFilters\",\n@@ -28,9 +36,11 @@ const TABLES: TableNames[] = [\n   \"notifications\",\n   \"notificationPreferences\",\n   \"unsubscribeTokens\",\n+  \"pushSubscriptions\",\n   \"userOnboarding\",\n   \"calendarEvents\",\n   \"meetingAttendance\",\n+  \"eventReminders\",\n   \"availabilitySlots\",\n   \"bookingPages\",\n   \"bookings\",\n@@ -40,6 +50,8 @@ const TABLES: TableNames[] = [\n   \"githubPullRequests\",\n   \"githubCommits\",\n   \"offlineSyncQueue\",\n+  \"testOtpCodes\",\n+  \"oauthHealthChecks\",\n   \"aiChats\",\n   \"aiMessages\",\n   \"aiSuggestions\",\n@@ -54,7 +66,10 @@ const TABLES: TableNames[] = [\n   \"hourComplianceRecords\",\n   \"invites\",\n   \"organizations\",\n+  \"organizationIpAllowlist\",\n   \"organizationMembers\",\n+  \"ssoC