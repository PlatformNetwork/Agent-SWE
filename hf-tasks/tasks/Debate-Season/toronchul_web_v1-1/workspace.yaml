patch: "diff --git a/src/app/globals.css b/src/app/globals.css\nindex 89c7200..79e8df2 100644\n--- a/src/app/globals.css\n+++ b/src/app/globals.css\n@@ -1,7 +1,13 @@\n+@import url(\"https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css\");\n @import \"tailwindcss\";\n \n-/* ── TDS (토론철 디자인 시스템) Theme Tokens ────────────────── */\n+/* ══════════════════════════════════════════════════════════════\n+   TDS (토론철 디자인 시스템) — Theme Tokens\n+   Flutter de_colors.dart + de_fonts.dart 기반\n+   ══════════════════════════════════════════════════════════════ */\n @theme inline {\n+  /* ── Colors ─────────────────────────────────────────────── */\n+\n   /* Base */\n   --color-white: #FFFFFF;\n \n@@ -56,20 +62,77 @@\n \n   /* Semantic Aliases */\n   --color-background: var(--color-grey-120);\n-  --color-foreground: var(--color-white);\n+  --color-foreground: var(--color-grey-10);\n   --color-surface: var(--color-grey-110);\n   --color-surface-elevated: var(--color-grey-100);\n-  --color-text-primary: var(--color-white);\n+  --color-text-primary: var(--color-grey-10);\n   --color-text-secondary: var(--color-grey-50);\n   --color-text-tertiary: var(--color-grey-30);\n   --color-border: var(--color-grey-90);\n \n-  /* Font */\n+  /* ── Typography ─────────────────────────────────────────── */\n+\n+  /* Font Family */\n   --font-sans: \"Pretendard Variable\", Pretendard, -apple-system,\n     BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n+\n+  /*\n+   * Font Size Tokens (text-* 유틸리티)\n+   * 사용법: class=\"text-largest\", \"text-header-28\", \"text-body-16\" 등\n+   * → font-size, line-height, letter-spacing 한 번에 적용\n+   * → 굵기는 별도로 font-bold / font-semibold / font-medium 조합\n+   */\n+\n+  /* largest — 48px / line 1.0 / ls -1.2px */\n+  --text-largest: 48px;\n+  --text-largest--line-height: 1;\n+  --text-largest--letter-spacing: -1.2px;\n+\n+  /* header-28 — 28px / line 1.5 / ls -0.7px */\n+  --text-header-28: 28px;\n+  --text-header-28--line-height: 1.5;\n+  --text-header-28--letter-spacing: -0.7px;\n+\n+  /* header-24 — 24px / line 1.5 / ls -0.6px */\n+  --text-header-24: 24px;\n+  --text-header-24--line-height: 1.5;\n+  --text-header-24--letter-spacing: -0.6px;\n+\n+  /* header-20 — 20px / line 1.4 / ls -0.5px */\n+  --text-header-20: 20px;\n+  --text-header-20--line-height: 1.4;\n+  --text-header-20--letter-spacing: -0.5px;\n+\n+  /* header-18 — 18px / line 1.4 / ls -0.45px */\n+  --text-header-18: 18px;\n+  --text-header-18--line-height: 1.4;\n+  --text-header-18--letter-spacing: -0.45px;\n+\n+  /* body-16 — 16px / line 1.5 / ls -0.4px */\n+  --text-body-16: 16px;\n+  --text-body-16--line-height: 1.5;\n+  --text-body-16--letter-spacing: -0.4px;\n+\n+  /* body-14 — 14px / line 1.5 / ls -0.35px */\n+  --text-body-14: 14px;\n+  --text-body-14--line-height: 1.5;\n+  --text-body-14--letter-spacing: -0.35px;\n+\n+  /* caption-12 — 12px / line 1.5 / ls -0.3px */\n+  --text-caption-12: 12px;\n+  --text-caption-12--line-height: 1.5;\n+  --text-caption-12--letter-spacing: -0.3px;\n+\n+  /* caption-12-tight — 12px / line 1.2 / ls -0.3px (caption12M2) */\n+  --text-caption-12-tight: 12px;\n+  --text-caption-12-tight--line-height: 1.2;\n+  --text-caption-12-tight--letter-spacing: -0.3px;\n }\n \n+/* ── Base Styles ──────────────────────────────────────────── */\n body {\n-  background: var(--color-background);\n-  color: var(--color-foreground);\n+  font-family: \"Pretendard Variable\", Pretendard, -apple-system,\n+    BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n+  background-color: var(--color-grey-120);\n+  color: var(--color-grey-10);\n }\ndiff --git a/tailwind.config.ts b/tailwind.config.ts\nindex 6698423..77fa811 100644\n--- a/tailwind.config.ts\n+++ b/tailwind.config.ts\n@@ -3,10 +3,17 @@ import type { Config } from \"tailwindcss\";\n /**\n  * 토론철 디자인 시스템(TDS) - Tailwind CSS 설정\n  *\n- * Flutter de_colors.dart 기반 컬러 토큰을 Tailwind 유틸리티로 매핑\n+ * Flutter de_colors.dart + de_fonts.dart 기반\n+ * 컬러·타이포그래피 토큰을 Tailwind 유틸리티로 매핑\n  *\n- * 사용 예시:\n+ * ─── 컬러 사용 예시 ──────────────────────\n  *   bg-brand, text-grey-50, border-red, bg-blue-dark 등\n+ *\n+ * ─── 타이포그래피 사용 예시 ──────────────\n+ *   text-header-24 font-bold     → header24B\n+ *   text-body-16 font-semibold   → body16Sb\n+ *   text-body-14 font-medium     → body14M\n+ *   text-caption-12 font-normal  → caption12R\n  */\n const config: Config = {\n   content: [\n@@ -16,11 +23,10 @@ const config: Config = {\n   ],\n   theme: {\n     extend: {\n+      /* ── Colors ─────────────────────────────── */\n       colors: {\n-        /* ── Base ─────────────────────────────────── */\n         white: \"#FFFFFF\",\n \n-        /* ── Grey Scale ───────────────────────────── */\n         grey: {\n           10: \"#EBE7ED\",\n           30: \"#C5C1C7\",\n@@ -33,13 +39,11 @@ const config: Config = {\n           120: \"#161416\",\n         },\n \n-        /* ── Transparency (Black) ─────────────────── */\n         trans: {\n           30: \"rgba(0, 0, 0, 0.30)\",\n           50: \"rgba(0, 0, 0, 0.50)\",\n         },\n \n-        /* ── Brand ────────────────────────────────── */\n         brand: {\n           DEFAULT: \"#996BFA\",\n           dark: \"#7E66B0\",\n@@ -47,10 +51,8 @@ const config: Config = {\n           trans: \"rgba(153, 107, 250, 0.80)\",\n         },\n \n-        /* ── Tag ──────────────────────────────────── */\n         tag: \"#3D2E5A\",\n \n-        /* ── Red (찬성/Pro) ───────────────────────── */\n         red: {\n           DEFAULT: \"#FF5C62\",\n           light: \"#FFB9BB\",\n@@ -59,7 +61,6 @@ const config: Config = {\n           mine: \"#654654\",\n         },\n \n-        /* ── Blue (반대/Con) ──────────────────────── */\n         blue: {\n           DEFAULT: \"#5A61FF\",\n           \"dark-on-grey\": \"#3C3A51\",\n@@ -67,7 +68,6 @@ const config: Config = {\n           mine: \"#4F4C71\",\n         },\n \n-        /* ── Image Accent Colors ──────────────────── */\n         image: {\n           red: \"#FE2222\",\n           orange: \"#FF813D\",\n@@ -78,9 +78,71 @@ const config: Config = {\n           purple: \"#9500AF\",\n         },\n \n-        /* ── Third-party ──────────────────────────── */\n         kakao: \"#FEE500\",\n       },\n+\n+      /* ── Typography ─────────────────────────── */\n+      fontFamily: {\n+        sans: [\n+          \"Pretendard Variable\",\n+          \"Pretendard\",\n+          \"-apple-system\",\n+          \"BlinkMacSystemFont\",\n+          \"Segoe UI\",\n+          \"Roboto\",\n+          \"Helvetica Neue\",\n+          \"Arial\",\n+          \"sans-serif\",\n+        ],\n+      },\n+\n+      fontSize: {\n+        /** 48px / line 1.0 / ls -1.2px — largest (Bold) */\n+        largest: [\n+          \"48px\",\n+          { lineHeight: \"1\", letterSpacing: \"-1.2px\" },\n+        ],\n+        /** 28px / line 1.5 / ls -0.7px — header28Sb */\n+        \"header-28\": [\n+          \"28px\",\n+          { lineHeight: \"1.5\", letterSpacing: \"-0.7px\" },\n+        ],\n+        /** 24px / line 1.5 / ls -0.6px — header24B */\n+        \"header-24\": [\n+          \"24px\",\n+          { lineHeight: \"1.5\", letterSpacing: \"-0.6px\" },\n+        ],\n+        /** 20px / line 1.4 / ls -0.5px — header20B */\n+        \"header-20\": [\n+          \"20px\",\n+          { lineHeight: \"1.4\", letterSpacing: \"-0.5px\" },\n+        ],\n+        /** 18px / line 1.4 / ls -0.45px — header18Sb */\n+        \"header-18\": [\n+          \"18px\",\n+          { lineHeight: \"1.4\", letterSpacing: \"-0.45px\" },\n+        ],\n+        /** 16px / line 1.5 / ls -0.4px — body16 (Sb/M/R) */\n+        \"body-16\": [\n+          \"16px\",\n+          { lineHeight: \"1.5\", letterSpacing: \"-0.4px\" },\n+        ],\n+        /** 14px / line 1.5 / ls -0.35px — body14 (Sb/M/R) */\n+        \"body-14\": [\n+          \"14px\",\n+          { lineHeight: \"1.5\", letterSpacing: \"-0.35px\" },\n+        ],\n+        /** 12px / line 1.5 / ls -0.3px — caption12 (SB/M/R) */\n+        \"caption-12\": [\n+          \"12px\",\n+          { lineHeight: \"1.5\", letterSpacing: \"-0.3px\" },\n+        ],\n+        /** 12px / line 1.2 / ls -0.3px — caption12M2 (tight) */\n+        \"caption-12-tight\": [\n+          \"12px\",\n+          { lineHeight: \"1.2\", letterSpacing: \"-0.3px\" },\n+        ],\n+      },\n     },\n   },\n   plugins: [],\n"
