patch: "diff --git a/README.md b/README.md\nindex a26cc99..803feff 100644\n--- a/README.md\n+++ b/README.md\n@@ -11,9 +11,7 @@ SQL-first semantic layer for consistent metrics across your data stack. Compatib\n \n ## Should I use Sidemantic\n \n-As you might notice, Sidemantic is a very ambitious and young semantic layer project. You will likely encounter some rough patches, especially with the more exotic features like converting between semantic model formats.\n-\n-For the time being it is recommended to use one of the formats that Sidemantic can read as your source of truth.\n+Sidemantic is a very ambitious and young semantic layer project. You may encounter rough patches, especially with the more exotic features like converting between semantic model formats.\n \n Issue reports are much appreciated if you try out Sidemantic and hit a snag 🫡\n \ndiff --git a/sidemantic/core/model.py b/sidemantic/core/model.py\nindex f04b41f..581dcd2 100644\n--- a/sidemantic/core/model.py\n+++ b/sidemantic/core/model.py\n@@ -117,9 +117,13 @@ class Model(BaseModel):\n \n         path = [dimension_name]\n \n-        # Walk up the parent chain\n+        # Walk up the parent chain with cycle detection\n         current = dim\n+        visited = {dimension_name}\n         while current and current.parent:\n+            if current.parent in visited:\n+                break\n+            visited.add(current.parent)\n             path.insert(0, current.parent)\n             current = self.get_dimension(current.parent)\n \ndiff --git a/sidemantic/mcp_server.py b/sidemantic/mcp_server.py\nindex 72f2be9..cc702ec 100644\n--- a/sidemantic/mcp_server.py\n+++ b/sidemantic/mcp_server.py\n@@ -1,6 +1,7 @@\n \"\"\"MCP server for Sidemantic semantic layer.\"\"\"\n \n import json\n+from datetime import date, datetime, time\n from decimal import Decimal\n from pathlib import Path\n from typing import Any, Literal\n@@ -41,10 +42,17 @@ def get_layer() -> SemanticLayer:\n def _convert_to_json_compatible(value: Any) -> Any:\n     \"\"\"Convert value to JSON-compatible type.\n \n-    Handles Decimal and other non-JSON-serializable types from database results.\n+    Handles Decimal, date, datetime, and other non-JSON-serializable types\n+    from database results.\n     \"\"\"\n     if isinstance(value, Decimal):\n         return float(value)\n+    if isinstance(value, datetime):\n+        return value.isoformat()\n+    if isinstance(value, date):\n+        return value.isoformat()\n+    if isinstance(value, time):\n+        return value.isoformat()\n     return value\n \n \n@@ -75,7 +83,7 @@ def _validate_filter(filter_str: str, dialect: str | None = None) -> None:\n                 sqlglot.exp.Update,\n                 sqlglot.exp.Create,\n                 sqlglot.exp.Command,\n-                sqlglot.exp.AlterTable,\n+                sqlglot.exp.Alter,\n             ),\n         ):\n             raise ValueError(f\"Filter contains disallowed SQL: {type(node).__name__}\")\ndiff --git a/tests/test_drill_down_api.py b/tests/test_drill_down_api.py\nindex 63d2b5b..13c8bc3 100644\n--- a/tests/test_drill_down_api.py\n+++ b/tests/test_drill_down_api.py\n@@ -111,6 +111,45 @@ def test_time_hierarchy_drill():\n     assert model.get_drill_up(\"event_year\") is None\n \n \n+def test_hierarchy_cycle_detection():\n+    \"\"\"Test that get_hierarchy_path terminates on cyclic parent references.\"\"\"\n+    model = Model(\n+        name=\"bad\",\n+        table=\"t\",\n+        dimensions=[\n+            Dimension(name=\"a\", type=\"categorical\", parent=\"b\"),\n+            Dimension(name=\"b\", type=\"categorical\", parent=\"a\"),\n+        ],\n+        metrics=[\n+            Metric(name=\"c\", agg=\"count\"),\n+        ],\n+    )\n+\n+    # Should terminate, not infinite loop\n+    path = model.get_hierarchy_path(\"a\")\n+    # b -> a, but b's parent is a which is already visited, so path is [b, a]\n+    assert \"a\" in path\n+    assert \"b\" in path\n+    assert len(path) == 2\n+\n+\n+def test_hierarchy_self_referencing_cycle():\n+    \"\"\"Test that get_hierarchy_path handles self-referencing parent.\"\"\"\n+    model = Model(\n+        name=\"bad\",\n+        table=\"t\",\n+        dimensions=[\n+            Dimension(name=\"a\", type=\"categorical\", parent=\"a\"),\n+        ],\n+        metrics=[\n+            Metric(name=\"c\", agg=\"count\"),\n+        ],\n+    )\n+\n+    path = model.get_hierarchy_path(\"a\")\n+    assert path == [\"a\"]\n+\n+\n def test_multiple_children():\n     \"\"\"Test dimension with multiple children.\"\"\"\n     model = Model(\ndiff --git a/tests/test_mcp_server.py b/tests/test_mcp_server.py\nindex 71dee3d..3a1df15 100644\n--- a/tests/test_mcp_server.py\n+++ b/tests/test_mcp_server.py\n@@ -531,6 +531,41 @@ def test_run_query_ungrouped(demo_layer):\n     assert result[\"row_count\"] == 3\n \n \n+def test_run_query_temporal_json_serialization(demo_layer):\n+    \"\"\"Test that date/datetime values in query results are converted to ISO strings.\"\"\"\n+    result = run_query(\n+        dimensions=[\"orders.order_date\"],\n+        metrics=[\"orders.total_revenue\"],\n+    )\n+\n+    assert result[\"row_count\"] > 0\n+    for row in result[\"rows\"]:\n+        for key, value in row.items():\n+            assert not isinstance(value, (Decimal,)), f\"Found Decimal value for {key}\"\n+\n+    # The entire result must be JSON serializable\n+    try:\n+        json.dumps(result)\n+    except TypeError as e:\n+        pytest.fail(f\"Result with date values is not JSON serializable: {e}\")\n+\n+    # Date values should be ISO format strings\n+    for row in result[\"rows\"]:\n+        if \"order_date\" in row:\n+            assert isinstance(row[\"order_date\"], str), f\"Expected ISO string, got {type(row['order_date'])}\"\n+\n+\n+def test_run_sql_temporal_json_serialization(demo_layer):\n+    \"\"\"Test that run_sql converts temporal values to ISO strings.\"\"\"\n+    result = run_sql(\"SELECT order_date__month, total_revenue FROM orders\")\n+\n+    assert result[\"row_count\"] > 0\n+    try:\n+        json.dumps(result)\n+    except TypeError as e:\n+        pytest.fail(f\"run_sql result with temporal values is not JSON serializable: {e}\")\n+\n+\n def test_catalog_resource(demo_layer):\n     \"\"\"Test catalog_resource returns valid JSON catalog metadata.\"\"\"\n     result = catalog_resource()\n"
