r.MainMapper\">\n \n+\t<select id=\"selectPushList\" parameterType=\"int\" resultType=\"com.late.donot.main.model.dto.PushSimpleDTO\">\n+\t    SELECT\n+\t        P.PUSH_NO,\n+\t        P.PUSH_NAME,\n+\t        P.PUSH_TIME,\n+\t        P.DAY_OF_WEEK,\n+\t        P.TRANSPORT_TYPE,\n+\t        R.START_NAME,\n+\t        R.END_NAME,\n+\t        R.START_STATION,\n+        \tR.END_STATION,\n+        \tP.IS_ACTIVE\n+\t    FROM PUSH P\n+\t    JOIN ROUTE R\n+\t      ON P.ROUTE_NO = R.ROUTE_NO\n+\t    WHERE P.MEMBER_NO = #{memberNo}\n+\t    ORDER BY P.PUSH_NO DESC\n+\t</select>\n \n+\t<select id=\"selectAveragePushTime\" parameterType=\"int\" resultType=\"int\">\n+        SELECT ROUND(AVG(PUSH_TIME))\n+        FROM PUSH\n+        WHERE MEMBER_NO = #{memberNo}\n+    </select>\n+    \n+    <update id=\"updatePushActive\">\n+\t    UPDATE PUSH\n+\t    SET IS_ACTIVE =\n+\t        CASE WHEN #{isActive} = 1 THEN 'Y'\n+\t             ELSE 'N'\n+\t        END\n+\t    WHERE PUSH_NO = #{pushNo}\n+\t      AND MEMBER_NO = #{memberNo}\n+\t</update>\n+\t\n+\t<delete id=\"deletePush\">\n+\t    DELETE FROM PUSH\n+\t    WHERE PUSH_NO = #{pushNo}\n+\t      AND MEMBER_NO = #{memberNo}\n+\t</delete>\n </mapper>\n\\ No newline at end of file\ndiff --git a/donotlate_project/src/main/resources/static/js/calculator.js b/donotlate_project/src/main/resources/static/js/calculator.js\nindex 0c1dcf7..de87b44 100644\n--- a/donotlate_project/src/main/resources/static/js/calculator.js\n+++ b/donotlate_project/src/main/resources/static/js/calculator.js\n@@ -775,3 +775,177 @@ function updateManualPushTime(route) {\n       document.getElementById(\"selected-route-label-recommend\").innerText = `${selectedRouteIndex + 1}번 경로 사용`;\n   }\n }\n+\n+let selectedPushType = null;\n+\n+document.addEventListener(\"DOMContentLoaded\", function () {\n+\n+    const recommendCard = document.getElementById(\"recommended-push-time-section\");\n+    const aiCard = document.getElementById(\"ai-recommended-push-time-section\");\n+\n+    if (recommendCard) {\n+        recommendCard.addEventListener(\"click\", () => applyPushTime(\"recommend\"));\n+    }\n+\n+    if (aiCard) {\n+        aiCard.addEventListener(\"click\", () => applyPushTime(\"ai\"));\n+    }\n+\n+    const buttons = document.querySelectorAll(\".weekday-btn\");\n+\n+    buttons.forEach(btn => {\n+\n+        btn.classList.add(\n+            \"h-10\",\n+            \"flex\",\n+            \"items-center\",\n+            \"justify-center\",\n+            \"rounded-lg\",\n+            \"text-sm\",\n+            \"font-medium\",\n+            \"transition\",\n+            \"bg-gray-100\",\n+            \"border\",\n+            \"border-gray-200\",\n+            \"text-gray-400\"\n+        );\n+\n+        btn.addEventListener(\"click\", function () {\n+\n+            const isSelected = btn.classList.contains(\"bg-blue-500\");\n+\n+            if (isSelected) {\n+                btn.classList.remove(\"bg-blue-500\", \"text-white\", \"font-semibold\", \"shadow-sm\", \"shadow-blue-200\");\n+                btn.classList.add(\"bg-gray-100\", \"border\", \"border-gray-200\", \"text-gray-400\");\n+            } else {\n+                btn.classList.remove(\"bg-gray-100\", \"border\", \"border-gray-200\", \"text-gray-400\");\n+                btn.classList.add(\"bg-blue-500\", \"text-white\", \"font-semibold\", \"shadow-sm\", \"shadow-blue-200\");\n+            }\n+\n+        });\n+\n+    });\n+\n+});\n+\n+\n+function applyPushTime(type) {\n+\n+    const recommendTime = document.getElementById(\"recommend-push-time\")?.innerText.trim();\n+    const aiTime = document.getElementById(\"ai-push-time\")?.innerText.trim();\n+    const alarmInput = document.getElementById(\"alarm-time\");\n+\n+    if (!alarmInput) return;\n+\n+    if (type === \"recommend\" && recommendTime && recommendTime !== \"--:--\") {\n+        alarmInput.value = recommendTime;\n+        selectedPushType = \"recommend\";\n+    }\n+\n+    if (type === \"ai\" && aiTime && aiTime !== \"--:--\") {\n+        alarmInput.value = aiTime;\n+        selectedPushType = \"ai\";\n+    }\n+}\n+\n+document.addEventListener(\"DOMContentLoaded\", function () {\n+\n+    const saveBtn = document.getElementById(\"push-save-btn\");\n+\n+    if (saveBtn) {\n+        saveBtn.addEventListener(\"click\", savePush);\n+    }\n+\n+});\n+\n+async function savePush() {\n+\n+    const pushName = document.getElementById(\"push-name\")?.value.trim();\n+    const alarmTime = document.getElementById(\"alarm-time\")?.value;\n+\n+    if (!pushName) {\n+        alert(\"Push 이름을 입력해주세요.\");\n+        return;\n+    }\n+\n+    if (!alarmTime) {\n+        alert(\"Push 시간을 설정해주세요.\");\n+        return;\n+    }\n+\n+    if (selectedRouteIndex === null) {\n+        alert(\"경로를 먼저 선택해주세요.\");\n+        return;\n+    }\n+\n+    const selectedRoute = currentRoutes[selectedRouteIndex];\n+\n+    const selectedDays = [];\n+    document.querySelectorAll(\".weekday-btn\").forEach(btn => {\n+        if (btn.classList.contains(\"bg-blue-500\")) {\n+            selectedDays.push(btn.dataset.day);\n+        }\n+    });\n+\n+    if (selectedDays.length === 0) {\n+        alert(\"반복 요일을 선택해주세요.\");\n+        return;\n+    }\n+\n+    const pushTimeNumber = alarmTime.replace(\":\", \"\");\n+\n+    const arrivalTime = document.getElementById(\"departure-time\")?.value.replace(\":\", \"\");\n+\n+    const prepareTime = parseInt(document.getElementById(\"prepare-time\").value || 0);\n+    const spareTime = parseInt(document.getElementById(\"transport-time\").value || 0);\n+\n+    const request = {\n+        pushName: pushName,\n+        transportType: detectTransportType(selectedRoute),\n+        arriveTime: Number(arrivalTime),\n+        prepareTime: prepareTime,\n+        spareTime: spareTime,\n+        pushTime: Number(pushTimeNumber),\n+        dayOfWeek: selectedDays.join(\"\"),\n+        startName: document.getElementById(\"departure-input\").value,\n+        startLat: Number(document.getElementById(\"departure-lat\").value),\n+        startLng: Number(document.getElementById(\"departure-lng\").value),\n+        endName: document.getElementById(\"arrival-input\").value,\n+        endLat: Number(document.getElementById(\"arrival-lat\").value),\n+        endLng: Number(document.getElementById(\"arrival-lng\").value),\n+        startStation: selectedRoute.firstStation,\n+        endStation: selectedRoute.lastStation\n+    };\n+\n+    try {\n+\n+        const response = await fetch(\"/calculator/push/save\", {\n+            method: \"POST\",\n+            headers: {\n+                \"Content-Type\": \"application/json\"\n+            },\n+            body: JSON.stringify(request)\n+        });\n+\n+        if (!response.ok) {\n+            throw new Error(\"저장 실패\");\n+        }\n+\n+        alert(\"Push가 저장되었습니다.\");\n+\n+    } catch (error) {\n+        console.error(error);\n+        alert(\"Push 저장 중 오류 발생\");\n+    }\n+\n+}\n+\n+function detectTransportType(route) {\n+    const hasSubway = route.steps.some(s => s.type === \"SUBWAY\");\n+    const hasBus    = route.steps.some(s => s.type === \"BUS\");\n+\n+    if (hasSubway && hasBus) return \"MIX\";\n+    if (hasSubway) return \"SUBWAY\";\n+    if (hasBus) return \"BUS\";\n+    return \"MIX\";\n+}\n\\ No newline at end of file\ndiff --git a/donotlate_project/src/main/resources/static/js/main.js b/donotlate_project/src/main/resources/static/js/main.js\nnew file mode 100644\nindex 0000000..a2cf3e0\n--- /dev/null\n+++ b/donotlate_project/src/main/resources/static/js/main.js\n@@ -0,0 +1,238 @@\n+document.addEventListener(\"DOMContentLoaded\", loadDashboard);\n+\n+async function loadDashboard() {\n+    try {\n+        const res = await fetch(\"/ui/dashboard\");\n+\n+        if (!res.ok) {\n+            console.error(\"대시보드 데이터 로드 실패\");\n+            return;\n+        }\n+\n+        const data = await res.json();\n+\n+        renderPushList(data.pushList);\n+        renderAverage(data.averagePushTime);\n+\n+    } catch (err) {\n+        console.error(\"에러 발생:\", err);\n+    }\n+}\n+\n+function renderPushList(list) {\n+\n+    const container = document.getElementById(\"push-list-container\");\n+    container.innerHTML = \"\";\n+\n+    if (!list || list.length === 0) {\n+        container.innerHTML =\n+            \"<div class='text-gray-400 text-center py-8'>저장된 Push가 없습니다.</div>\";\n+        return;\n+    }\n+\n+    list.forEach(push => {\n+\n+        const timeStr24 = formatTime(push.pushTime);\n+        const timeStr = formatToAmPm(timeStr24);\n+        const dayText = convertDayText(push.dayOfWeek);\n+\n+        const isActive = push.isActive === \"Y\";\n+\n+        let badgeClass = \"\";\n+        let badgeText = \"\";\n+\n+        if (push.transportType === \"SUBWAY\") {\n+            badgeClass = \"bg-blue-100 text-blue-700\";\n+            badgeText = \"지하철\";\n+        }\n+        else if (push.transportType === \"BUS\") {\n+            badgeClass = \"bg-green-100 text-green-700\";\n+            badgeText = \"버스\";\n+        }\n+        else {\n+            badgeClass = \"bg-yellow-100 text-yellow-700\";\n+            badgeText = \"혼합\";\n+        }\n+\n+        const routeText = push.startStation && push.endStation\n+        ? `${push.startStation} ~ ${push.endStation}`\n+        : `${push.startName} ~ ${push.endName}`;\n+\n+        const opacityClass = isActive ? \"\" : \"opacity-60\";\n+\n+        const checkedAttr = isActive ? \"checked\" : \"\";\n+\n+        const card = `\n+        <div class=\"relative flex-between p-4 bg-gray-50 rounded-xl border border-gray-200 ${opacityClass}\">\n+\n+            <button \n+                onclick=\"deletePush(${push.pushNo}, this)\"\n+                class=\"absolute top-2 right-2 text-gray-400 hover:text-red-500 text-xs font-bold\">\n+                ✕\n+            </button>\n+\n+            <div class=\"flex-1\">\n+                <div class=\"font-semibold text-gray-900\">\n+                    ${push.pushName}\n+                </div>\n+\n+                <div class=\"text-secondary mt-1\">\n+                    ${dayText} | Push 알람 시간 : ${timeStr}\n+                </div>\n+\n+                <div class=\"flex-center-gap-2 mt-2\">\n+                  <span class=\"px-3 py-1 rounded-full text-xs font-semibold ${badgeClass}\">\n+                      ${badgeText}\n+                  </span>\n+\n+                  <span class=\"text-xs text-muted\">\n+                      ${routeText}\n+                  </span>\n+                </div>\n+            </div>\n+\n+            <label class=\"relative inline-flex items-center cursor-pointer ml-4\">\n+              <input type=\"checkbox\" ${checkedAttr}\n+                  onchange=\"togglePushActive(${push.pushNo}, this)\"\n+                  class=\"sr-only peer\">\n+                \n+              <div class=\"w-11 h-6 bg-gray-200 peer-focus:outline-none\n+                  peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer\n+                  peer-checked:after:translate-x-full\n+                  peer-checked:after:border-white after:content-['']\n+                  after:absolute after:top-[2px] after:left-[2px]\n+                  after:bg-white after:border-gray-300 after:border\n+                  after:rounded-full after:h-5 after:w-5 after:transition-all\n+                  peer-checked:bg-blue-600\">\n+              </div>\n+          </label>\n+        </div>\n+        `;\n+\n+        container.innerHTML += card;\n+    });\n+}\n+function renderAverage(avg) {\n+\n+    if (avg == null) return;\n+\n+    const timeStr = formatTime(avg);\n+\n+    const hour = parseInt(timeStr.split(\":\")[0]);\n+    const ampm = hour >= 12 ? \"오후\" : \"오전\";\n+\n+    document.getElementById(\"avg-push-time\").innerText = timeStr;\n+    document.getElementById(\"avg-push-ampm\").innerText = ampm;\n+\n+    const percent =\n+        hour < 7 ? 97.3 :\n+        hour < 8 ? 95.2 :\n+        hour < 9 ? 80.5 :\n+        hour < 10 ? 60.1 : 45.3;\n+\n+    document.getElementById(\"avg-rank-text\").innerText =\n+        `당신은 상위 ${percent}%의 일찍 일어나는 사람입니다.`;\n+}\n+\n+function formatTime(num) {\n+\n+    const str = num.toString().padStart(4, \"0\");\n+    return str.slice(0, 2) + \":\" + str.slice(2);\n+}\n+\n+function convertDayText(dayStr) {\n+\n+    if (!dayStr) return \"\";\n+\n+    const map = {\n+        1: \"월\",\n+        2: \"화\",\n+        3: \"수\",\n+        4: \"목\",\n+        5: \"금\",\n+        6: \"토\",\n+        7: \"일\"\n+    };\n+\n+    const cleaned = String(dayStr).match(/[1-7]/g);\n+    if (!cleaned) return \"\";\n+\n+    const days = cleaned.map(Number).sort((a,b)=>a-b);\n+\n+    if (days.length === 1) {\n+        return map[days[0]];\n+    }\n+\n+    if (days.join(\"\") === \"1234567\") return \"매일\";\n+\n+    let isContinuous = true;\n+    for (let i = 1; i < days.length; i++) {\n+        if (days[i] !== days[i-1] + 1) {\n+            isContinuous = false;\n+            break;\n+        }\n+    }\n+\n+    if (isContinuous) {\n+        return `${map[days[0]]}~${map[days[days.length - 1]]}`;\n+    }\n+\n+    return days.map(d => map[d]).join(\",\");\n+}\n+\n+function formatToAmPm(time24) {\n+\n+    const [hourStr, minute] = time24.split(\":\");\n+    let hour = parseInt(hourStr);\n+\n+    const ampm = hour >= 12 ? \"PM\" : \"AM\";\n+\n+    hour = hour % 12;\n+    if (hour === 0) hour = 12;\n+\n+    return `${hour.toString().padStart(2, \"0\")}:${minute} ${ampm}`;\n+}\n+\n+async function togglePushActive(pushNo, checkbox) {\n+\n+    const isActive = checkbox.checked ? 1 : 0;\n+\n+    const card = checkbox.closest(\".flex-between\");\n+\n+    try {\n+        await fetch(`/ui/push/${pushNo}/active`, {\n+            method: \"PATCH\",\n+            headers: { \"Content-Type\": \"application/json\" },\n+            body: JSON.stringify({ isActive })\n+        });\n+\n+        if (isActive === 0) {\n+            card.classList.add(\"opacity-60\");\n+        } else {\n+            card.classList.remove(\"opacity-60\");\n+        }\n+\n+    } catch (e) {\n+        alert(\"상태 변경 실패\");\n+        checkbox.checked = !checkbox.checked;\n+    }\n+}\n+\n+async function deletePush(pushNo, btn) {\n+\n+    if (!confirm(\"정말 삭제하시겠습니까?\")) return;\n+\n+    try {\n+        const res = await fetch(`/ui/push/${pushNo}`, {\n+            method: \"DELETE\"\n+        });\n+\n+        if (!res.ok) throw new Error();\n+\n+        const card = btn.closest(\".relative\");\n+        card.remove();\n+\n+    } catch (e) {\n+        alert(\"삭제 실패\");\n+    }\n+}\n\\ No newline at end of file\ndiff --git a/donotlate_project/src/main/resources/templates/calculator.html b/donotlate_project/src/main/resources/templates/calculator.html\nindex 3a227f8..7f93cf3 100644\n--- a/donotlate_project/src/main/resources/templates/calculator.html\n+++ b/donotlate_project/src/main/resources/templates/calculator.html\n@@ -213,7 +213,7 @@\n                     <div class=\"space-y-4\">\n                         <div>\n                             <label class=\"text-sm font-medium text-gray-700 mb-2 block\">Push 이름</label>\n-                            <input type=\"text\" placeholder=\"예: 출근하러 갑니다.\" maxlength=\"20\" class=\"w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 font-medium\">\n+                            <input id=\"push-name\" type=\"text\" placeholder=\"예: 출근하러 갑니다.\" maxlength=\"20\" class=\"w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 font-medium\">\n                         </div>\n                         <div>\n                             <label class=\"text-sm font-medium text-gray-700 mb-2 block\">Push 설정 시간</label>\n@@ -221,14 +221,14 @@\n                         </div>\n                         <div>\n                             <label class=\"text-sm font-medium text-gray-700 mb-2 block\">반복 요일</label