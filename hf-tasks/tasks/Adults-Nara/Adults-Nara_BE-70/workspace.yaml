patch: "diff --git a/apps/core-api/src/main/java/com/ott/core/global/security/SecurityConfig.java b/apps/core-api/src/main/java/com/ott/core/global/security/SecurityConfig.java\nindex 6eb8c10..132e27e 100644\n--- a/apps/core-api/src/main/java/com/ott/core/global/security/SecurityConfig.java\n+++ b/apps/core-api/src/main/java/com/ott/core/global/security/SecurityConfig.java\n@@ -41,6 +41,7 @@ public class SecurityConfig {\n                         .requestMatchers(\"/api/v1/bookmarks/**\").permitAll()\n                         .requestMatchers(\"/swagger-ui/**\", \"/v3/api-docs/**\").permitAll()\n                         .requestMatchers(\"/api/v1/search/admin/**\").permitAll()\n+                        .requestMatchers(\"/api/v1/recommendations/feed/**\").permitAll()\n \n                         // ✅ 사용자 목록 조회는 ADMIN만 가능\n                         .requestMatchers(HttpMethod.GET, \"/api/v1/users\").hasRole(\"ADMIN\")\ndiff --git a/apps/core-api/src/main/java/com/ott/core/modules/preference/dto/TagScoreDto.java b/apps/core-api/src/main/java/com/ott/core/modules/preference/dto/TagScoreDto.java\nnew file mode 100644\nindex 0000000..bad2bc9\n--- /dev/null\n+++ b/apps/core-api/src/main/java/com/ott/core/modules/preference/dto/TagScoreDto.java\n@@ -0,0 +1,7 @@\n+package com.ott.core.modules.preference.dto;\n+\n+public record TagScoreDto (\n+        String tagName,\n+        Double score\n+) {\n+}\ndiff --git a/apps/core-api/src/main/java/com/ott/core/modules/preference/repository/UserPreferenceRepository.java b/apps/core-api/src/main/java/com/ott/core/modules/preference/repository/UserPreferenceRepository.java\nindex 57b9c48..486dd28 100644\n--- a/apps/core-api/src/main/java/com/ott/core/modules/preference/repository/UserPreferenceRepository.java\n+++ b/apps/core-api/src/main/java/com/ott/core/modules/preference/repository/UserPreferenceRepository.java\n@@ -5,6 +5,7 @@ import org.springframework.data.jpa.repository.Modifying;\n import org.springframework.data.jpa.repository.Query;\n import org.springframework.data.repository.query.Param;\n import java.time.LocalDateTime;\n+import java.util.List;\n \n public interface UserPreferenceRepository extends JpaRepository<UserPreference, Long> {\n \n@@ -27,4 +28,7 @@ public interface UserPreferenceRepository extends JpaRepository<UserPreference,\n                   @Param(\"tagId\") Long tagId,\n                   @Param(\"addScore\") Double addScore,\n                   @Param(\"now\") LocalDateTime now);\n+\n+    @Query(\"SELECT up FROM UserPreference up JOIN FETCH up.tag WHERE up.user.id = :userId ORDER BY up.score DESC\")\n+    List<UserPreference> findWithTagByUserId(@Param(\"userId\") Long userId);\n }\n\\ No newline at end of file\ndiff --git a/apps/core-api/src/main/java/com/ott/core/modules/preference/service/UserPreferenceService.java b/apps/core-api/src/main/java/com/ott/core/modules/preference/service/UserPreferenceService.java\nindex 23a89c3..d4f0f3b 100644\n--- a/apps/core-api/src/main/java/com/ott/core/modules/preference/service/UserPreferenceService.java\n+++ b/apps/core-api/src/main/java/com/ott/core/modules/preference/service/UserPreferenceService.java\n@@ -1,8 +1,10 @@\n package com.ott.core.modules.preference.service;\n \n import com.ott.common.persistence.entity.Tag;\n+import com.ott.common.persistence.entity.UserPreference;\n import com.ott.common.persistence.enums.InteractionType;\n import com.ott.common.util.IdGenerator;\n+import com.ott.core.modules.preference.dto.TagScoreDto;\n import com.ott.core.modules.preference.repository.UserPreferenceRepository;\n import com.ott.core.modules.tag.repository.VideoTagRepository;\n import lombok.RequiredArgsConstructor;\n@@ -101,4 +103,49 @@ public class UserPreferenceService {\n             case DISLIKE -> SCORE_DISLIKE;\n         };\n     }\n+    /**\n+     * [조회 API] 유저의 Top N 취향 태그 가져오기 (Cache-Aside 패턴 적용)\n+     */\n+    @Transactional(readOnly = true)\n+    public List<TagScoreDto> getTopPreferences(Long userId, int limit) {\n+        String redisKey = \"user:\" + userId + \":preference\";\n+\n+        // 1. [Cache Hit] Redis에서 먼저 조회 (1등부터 한도(limit)까지 가져옴)\n+        // 0은 1등, limit - 1은 N등을 의미합니다.\n+        var redisResult = stringRedisTemplate.opsForZSet().reverseRangeWithScores(redisKey, 0, limit - 1);\n+\n+        if (redisResult != null && !redisResult.isEmpty()) {\n+            log.info(\"[Preference Read] Redis 캐시 히트! 초고속 반환 - userId: {}\", userId);\n+            return redisResult.stream()\n+                    .map(tuple -> new TagScoreDto(tuple.getValue(), tuple.getScore()))\n+                    .toList();\n+        }\n+\n+        // 2. [Cache Miss] Redis에 데이터가 텅 비었음! DB에서 조회 시작\n+        log.warn(\"[Preference Read] Redis 캐시 미스. DB에서 조회 및 자가 복구 진행 - userId: {}\", userId);\n+        List<UserPreference> dbPreferences = userPreferenceRepository.findWithTagByUserId(userId);\n+\n+        if (dbPreferences.isEmpty()) {\n+            log.info(\"[Preference Read] 취향 데이터가 없는 신규 유저입니다 - userId: {}\", userId);\n+            return List.of(); // 빈 리스트 반환 (나중에 ES에서 기본 인기 영상 노출용으로 쓰임)\n+        }\n+\n+        // 3. [Self-Healing] DB에서 가져온 데이터를 다시 Redis에 채워 넣기 (복구)\n+        List<TagScoreDto> recoveredScores = new java.util.ArrayList<>();\n+\n+        for (UserPreference pref : dbPreferences) {\n+            String tagName = pref.getTag().getTagName();\n+            Double score = pref.getScore();\n+\n+            // Redis에 다시 ZADD\n+            stringRedisTemplate.opsForZSet().add(redisKey, tagName, score);\n+            recoveredScores.add(new TagScoreDto(tagName, score));\n+        }\n+\n+        // 4. 복구된 데이터를 점수 내림차순으로 정렬해서 요청한 개수(limit)만큼만 짤라서 반환\n+        return recoveredScores.stream()\n+                .sorted((a, b) -> Double.compare(b.score(), a.score()))\n+                .limit(limit)\n+                .toList();\n+    }\n }\n\\ No newline at end of file\ndiff --git a/apps/core-api/src/main/java/com/ott/core/modules/search/controller/RecommendationController.java b/apps/core-api/src/main/java/com/ott/core/modules/search/controller/RecommendationController.java\nnew file mode 100644\nindex 0000000..4bee138\n--- /dev/null\n+++ b/apps/core-api/src/main/java/com/ott/core/modules/search/controller/RecommendationController.java\n@@ -0,0 +1,26 @@\n+package com.ott.core.modules.search.controller;\n+\n+import com.ott.core.modules.search.document.VideoDocument;\n+import com.ott.core.modules.search.service.RecommendationService;\n+import lombok.RequiredArgsConstructor;\n+import org.springframework.http.ResponseEntity;\n+import org.springframework.web.bind.annotation.*;\n+\n+import java.util.List;\n+\n+@RestController\n+@RequestMapping(\"/api/v1/recommendations\")\n+@RequiredArgsConstructor\n+public class RecommendationController {\n+    private final RecommendationService recommendationService;\n+\n+    @GetMapping(\"/feed\")\n+    public ResponseEntity<List<VideoDocument>> getFeed(\n+            @RequestParam Long userId,\n+            @RequestParam(defaultValue = \"0\") int page,\n+            @RequestParam(defaultValue = \"10\") int size\n+    ) {\n+        List<VideoDocument> recommendedVideos = recommendationService.getPersonalizedFeed(userId, page, size);\n+        return ResponseEntity.ok(recommendedVideos);\n+    }\n+}\ndiff --git a/apps/core-api/src/main/java/com/ott/core/modules/search/document/VideoDocument.java b/apps/core-api/src/main/java/com/ott/core/modules/search/document/VideoDocument.java\nindex 96c9700..e1a1dc7 100644\n--- a/apps/core-api/src/main/java/com/ott/core/modules/search/document/VideoDocument.java\n+++ b/apps/core-api/src/main/java/com/ott/core/modules/search/document/VideoDocument.java\n@@ -36,4 +36,17 @@ public class VideoDocument {\n \n     @Field(type = FieldType.Keyword)\n     private String videoType;\n+\n+    public static VideoDocument of(com.ott.common.persistence.entity.VideoMetadata video, List<String> tags) {\n+        return VideoDocument.builder()\n+                .id(video.getId())\n+                .title(video.getTitle())\n+                .description(video.getDescription())\n+                .tags(tags)\n+                .viewCount(video.getViewCount())\n+                .likeCount(video.getLikeCount())\n+                .createdAt(video.getCreatedAt().toString())\n+                .videoType(video.getVideoType() != null ? video.getVideoType().name() : \"NONE\")\n+                .build();\n+    }\n }\ndiff --git a/apps/core-api/src/main/java/com/ott/core/modules/search/service/RecommendationService.java b/apps/core-api/src/main/java/com/ott/core/modules/search/service/RecommendationService.java\nnew file mode 100644\nindex 0000000..9c7b539\n--- /dev/null\n+++ b/apps/core-api/src/main/java/com/ott/core/modules/search/service/RecommendationService.java\n@@ -0,0 +1,112 @@\n+package com.ott.core.modules.search.service;\n+\n+import co.elastic.clients.elasticsearch._types.query_dsl.FieldValueFactorModifier;\n+import co.elastic.clients.elasticsearch._types.query_dsl.FunctionBoostMode;\n+import co.elastic.clients.elasticsearch._types.query_dsl.FunctionScore;\n+import co.elastic.clients.elasticsearch._types.query_dsl.FunctionScoreMode;\n+import co.elastic.clients.elasticsearch._types.query_dsl.FunctionScoreQuery;\n+import co.elastic.clients.elasticsearch._types.query_dsl.Query;\n+import com.ott.core.modules.preference.dto.TagScoreDto;\n+import com.ott.core.modules.preference.service.UserPreferenceService;\n+import com.ott.core.modules.search.document.VideoDocument;\n+import lombok.RequiredArgsConstructor;\n+import lombok.extern.slf4j.Slf4j;\n+import org.springframework.data.domain.PageRequest;\n+import org.springframework.data.domain.Sort;\n+import org.springframework.data.elasticsearch.client.elc.NativeQuery;\n+import org.springframework.data.elasticsearch.core.ElasticsearchOperations;\n+import org.springframework.data.elasticsearch.core.SearchHit;\n+import org.springframework.data.elasticsearch.core.SearchHits;\n+import org.springframework.stereotype.Service;\n+\n+import java.util.ArrayList;\n+import java.util.List;\n+\n+@Slf4j\n+@Service\n+@RequiredArgsConstructor\n+public class RecommendationService {\n+\n+    private final UserPreferenceService userPreferenceService;\n+    private final ElasticsearchOperations elasticsearchOperations;\n+\n+    /**\n+     * 메인 피드 맞춤형 추천 비디오 목록 조회\n+     */\n+    public List<VideoDocument> getPersonalizedFeed(Long userId, int page, int size) {\n+        // 1. Redis(또는 DB)에서 유저의 최애 태그 Top 5를 가져온다. (Cache-Aside 발동!)\n+        List<TagScoreDto> userPreferences = userPreferenceService.getTopPreferences(userId, 5);\n+\n+\n+        NativeQuery searchQuery = userPreferences.isEmpty()\n+                ? buildFallbackQuery(page, size)\n+                : buildPersonalizedQuery(userPreferences, page, size);\n+\n+        // 쿼리를 Elasticsearch에 날려서 결과 받기\n+        SearchHits<VideoDocument> searchHits = elasticsearchOperations.search(searchQuery, VideoDocument.class);\n+\n+        // 실제 Document 객체만 쏙 뽑아서 리스트로 반환합니다.\n+        return searchHits.getSearchHits().stream()\n+                .map(SearchHit::getContent)\n+                .toList();\n+    }\n+\n+    private NativeQuery buildFallbackQuery(int page, int size) {\n+        // ==========================================\n+        // [Fallback] 취향 데이터가 없는 신규 유저\n+        // ==========================================\n+        log.info(\"[추천 API] 신규 유저입니다. 인기/최신순 기본 피드를 제공합니다.\");\n+        return NativeQuery.builder()\n+                .withQuery(q -> q.matchAll(m -> m)) // 조건 없이 전부 다\n+                .withSort(Sort.by(Sort.Direction.DESC, \"viewCount\")) // 1순위: 조회수 높은 순\n+                .withSort(Sort.by(Sort.Direction.DESC, \"createdAt\")) // 2순위: 최신순\n+                .withPageable(PageRequest.of(page, size))\n+                .build();\n+    }\n+\n+    private NativeQuery buildPersonalizedQuery(List<TagScoreDto> userPreferences, int page, int size) {\n+        // ==========================================\n+        // [Personalized] 취향 데이터가 있는 기존 유저\n+        // ==========================================\n+        log.info(\"[추천 API] 맞춤형 추천 시작! 선호 태그 개수: {}\", userPreferences.size());\n+\n+        List<FunctionScore> functions = new ArrayList<>();\n+\n+        // 가중치 1: 유저의 취향 태그 매칭 (태그 점수만큼 가중치 부여)\n+        for (TagScoreDto pref : userPreferences) {\n+\n+            // 방어 로직: 점수가 0 이하면(싫어하는 태그면) 가중치 계산에서 제외합니다!\n+            if (pref.score() <= 0) {\n+                continue;\n+            }\n+            functions.add(FunctionScore.of(f -> f\n+                    .filter(fq -> fq.term(t -> t.field(\"tags\").value(pref.tagName())))\n+                    .weight(pref.score()) // ex: SF태그면 점수 x 9.0배!\n+            ));\n+        }\n+\n+        // 가중치 2: 대중성 (조회수)\n+        // 조회수가 높을수록 점수를 완만하게 올려줍니다 (Log1p 사용)\n+        functions.add(FunctionScore.of(f -> f\n+                .fieldValueFactor(fv -> fv\n+                        .field(\"viewCount\")\n+                        .modifier(FieldValueFactorModifier.Log1p)\n+                        .factor(0.1) // 조회수 영향력 조절\n+                )\n+        ));\n+\n+        // Function Score 쿼리 조립\n+        Query functionScoreQuery = FunctionScoreQuery.of(fsq -> fsq\n+                .query(q -> q.matchAll(m -> m)) // 일단 다 가져와서\n+                .functions(functions)           // 위에서 만든 채점표로 점수를 매김\n+                .scoreMode(FunctionScoreMode.Sum) // 채점표 점수들을 다 더함\n+                .boostMode(FunctionBoostMode.Multiply) // 최종 점수에 곱함\n+        )._toQuery();\n+\n+        return NativeQuery.builder()\n+                .withQuery(functionScoreQuery)\n+                .withPageable(PageRequest.of(page, size))\n+                .build();\n+    }\n+}\n+\ndiff --git a/apps/core-api/src/main/java/com/ott/core/modules/search/service/VideoSyncService.java b/apps/core-api/src/main/java/com/ott/core/modules/search/service/VideoSyncService.java\nindex 985c4d0..134142d 100644\n--- a/apps/core-api/src/main/java/com/ott/core/modules/search/service/VideoSyncService.java\n+++ b/apps/core-api/src/main/java/com/ott/core/modules/search/service/VideoSyncService.java\n@@ -38,15 +38,12 @@ public class VideoSyncService {\n             int totalSynced = 0;\n \n             while (hasNext) {\n-                // 1. 1000개씩 잘라서 DB에서 가져오기 (Pageable 적용)\n-                Page<VideoMetadata> videoPage = videoMetadataRepository.findAll(PageRequest.of(page, chunkSize));\n+                // findAll 대신 새로 만든 findSliceBy 호출 (Page -> Slice로 변경)\n+                org.springframework.data.domain.Slice<VideoMetadata> videoSlice = videoMetadataRepository.findSliceBy(PageRequest.of(page, chunkSize));\n \n-                if (videoPage.isEmpty()) {\n-                    break;\n-                }\n+                if (videoSlice.isEmpty()) break;\n \n-                // 1. 방금 가져온 비디오 1000개의 ID만 뽑아 리스트로 만든다.\n-                List<Long> videoIds = videoPage.stream().map(VideoMetadata::getId).toList();\n+                List<Long> videoIds = videoSlice.stream().map(VideoMetadata::getId).toList();\n \n                 // 2. IN 절을 써서  \"단 한 번의 쿼리\"로 가져온다\n                 List<VideoTag> allTagsForChunk = videoTagRepository.findWithTagByVideoMetadataIdIn(videoIds);\n@@ -60,23 +57,13 @@ public class VideoSyncService {\n                         ));\n \n                 // 4. 비디오 엔티티를 ES용 문서로 변환\n-                List<VideoDocument> documents = videoPage.stream().map(video -> {\n+                List<VideoDocument> documents = videoSlice.stream().map(video -> {\n \n                     // 미리 만들어둔 메모리 맵(tagsByVideoId)에서 0.0001초 만에 빼온다.\n                     List<String> tagNames = tagsByVideoId.getOrDefault(video.getId(), java.util.List.of());\n \n-                    // ES 전용 객체로 조립\n-                    return VideoDocument.builder()\n-                            .id(video.getId())\n-                            .title(video.getTitle())\n-                            .description(video.getDescription())\n-                            .tags(tagNames)\n-                            .viewCount(video.getViewCount())\n-                            .likeCount(video.getLikeCount())\n-                            .createdAt(video.getCreatedAt().toString()) // 날짜를 안전한 문자열\n-                            .videoType(video.getVideoType() != null ? video.getVideoType().name() : \"NONE\")\n-                            .build();\n-            }).toList();\n+                    return VideoDocument.of(video, tagNames); // 문서 조립 책임을 위임!\n+                }).toList();\n \n                 // 1000개 묶음을 엘라스틱서치에 벌크 저장\n                 videoSearchRepository.saveAll(documents);\n@@ -85,7 +72,7 @@ public class VideoSyncService {\n                 log.info(\"[ES Sync] {}번째 페이지({}건) 인덱싱 완료...\", page, documents.size());\n \n                 // 다음 페이지가 있는지 확인하고 넘어가기\n-                hasNext = videoPage.hasNext();\n+                hasNext = videoSlice.hasNext();\n                 page++;\n             }\n \ndiff --git a/apps/core-api/src/main/java/com/ott/core/modules/video/repository/VideoMetadataRepository.java b/apps/core-api/src/main/java/com/ott/core/modules/video/repository/VideoMetadataRepository.java\nindex 2a96ce5..08ef5ca 100644\n--- a/apps/core-api/src/main/java/com/ott/core/modules/video/repository/VideoMetadataRepository.java\n+++ b/apps/core-api/src/main/java/com/ott/core/modules/video/repository/VideoMetadataRepository.java\n@@ -50,4 +50,7 @@ public interface VideoMetadataRepository extends JpaRepository<VideoMetadata, Lo\n     @Modifying(clearAutomatically = true, flushAutomatically = true)\n     @Query(\"UPDATE VideoMetadata v SET v.bookmarkCount = v.bookmarkCount - 1 WHERE v.id = :id AND v.bookmarkCount > 0\")\n     void decreaseBookmarkCount(@Param(\"id\") Long id);\n+\n+    // COUNT 쿼리 없이 딱 (요청한 사이즈 + 1)개만 가져와서 다음 페이지 여부만 판단하는 Slice\n+    org.springframework.data.domain.Slice<VideoMetadata> findSliceBy(org.springframework.data.domain.Pageable pageable);\n }\n"
