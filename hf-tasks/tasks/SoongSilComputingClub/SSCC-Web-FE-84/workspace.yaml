  \ 추가 및 간격 수정\r\n- 실제 모집 일정 반영q\r\n- 관리자의 경우 항상 지원서 작성 버튼 보이도록 구현 \r\n- 활동 상세 페이지에서\
  \ 처음 사진에서 마지막 사진으로, 마지막 사진에서 처음 사진으로 바로 넘길 수 있도록 수정\r\n\r\n\r\n## \U0001F3AF 목적\r\
  \n\r\n전반적인 UI 일관성과 가독성을 개선하며, 최종 문구를 반영하고 관리자의 경우 실제 서류 접수 날짜와 상관없이 지원서 작성 버튼이 보이도록\
  \ 작업입니다.\r\n\r\n## \U0001F4CB 체크리스트\r\n\r\n<!-- PR 제출 전 확인해주세요. 해당 항목에 [x]로 체크해주세요.\
