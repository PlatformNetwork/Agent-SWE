m.com/docs/git-bisect) to do this automatically.\n+\n+**1. Create a minimal reproducible example (MRE)**\n+\n+First, reduce your bug to the smallest possible Python script that reproduces it. See\n+[this guide](https://matthewrocklin.com/minimal-bug-reports/) for guidance.\n+\n+**2. Turn your MRE into a bisect script**\n+\n+Save the following as `bisect.py` in the root of the repository, adding your MRE at the bottom. You\n+can add it to `.git/info/exclude` to ignore it locally without affecting the repository's\n+`.gitignore`:\n+\n+```python\n+import subprocess\n+import sys\n+\n+# Try to build Polars. Skip this commit if the build fails.\n+build = subprocess.run([\"make\", \"build\"])\n+if build.returncode != 0:\n+    sys.exit(125)  # tell git bisect to skip this commit\n+\n+import polars as pl\n+\n+# Your MRE here.\n+# If Python exits with an unhandled exception, git bisect treats it as a bad commit.\n+# If it exits normally (no exception, no sys.exit), it is treated as a good commit.\n+# Example:\n+# result = pl.Series([1, 2, 3]).some_method()\n+# assert result == expected, f\"Got {result}\"\n+```\n+\n+The script must exit with:\n+\n+- `0` if the bug is **not** present (good commit, normal Python exit)\n+- `1` (or any non-zero code except `125`) if the bug **is** present (bad commit, e.g. an assertion\n+  error)\n+- `125` to tell `git bisect` to skip the commit (e.g. it does not build)\n+\n+**3. Mark a good and a bad commit**\n+\n+Find a commit hash or [release tag](https://github.com/pola-rs/polars/tags) where the bug did not\n+exist (e.g. `py-1.32.0` for Polars 1.32.0) and another hash or tag which is confirmed to contain the\n+bug (e.g. `HEAD` if it still exists):\n+\n+```bash\n+git bisect start\n+git bisect bad HEAD\n+git bisect good py-1.32.0\n+```\n+\n+**4. Run the bisect automatically**\n+\n+From the root of the repository, run:\n+\n+```bash\n+git bisect run .venv/bin/python bisect.py\n+```\n+\n+`git bisect` will binary-search through the commit history and print the first bad commit when it is\n+done.\n+\n+**5. Include the result in your issue**\n+\n+Copy the output (the commit hash and message) and add it to your\n+[bug report](https://github.com/pola-rs/polars/issues/new?labels=bug&template=bug_report_python.yml).\n+This greatly speeds up the investigation for maintainers.\n+\n+When you are done, reset your repository:\n+\n+```bash\n+git bisect reset\n+```\n+\n ### Pull requests\n \n When you have resolved your issue,\ndiff --git a/py-polars/docs/source/reference/sql/functions/string.rst b/py-polars/docs/source/reference/sql/functions/string.rst\nindex 52bc4c30ae..49aafd8f0e 100644\n--- a/py-polars/docs/source/reference/sql/functions/string.rst\n+++ b/py-polars/docs/source/reference/sql/functions/string.rst\n@@ -25,6 +25,8 @@ String\n      - Returns the character length of the string.\n    * - :ref:`LOWER <lower>`\n      - Returns a lowercased column.\n+   * - :ref:`LPAD <lpad>`\n+     - Pads a string on the left to a specified length using an optional fill character (default is a space).\n    * - :ref:`LTRIM <ltrim>`\n      - Strips whitespaces from the left.\n    * - :ref:`NORMALIZE <normalize>`\n@@ -39,6 +41,8 @@ String\n      - Returns the reversed string.\n    * - :ref:`RIGHT <right>`\n      - Returns the last (rightmost) `n` characters.\n+   * - :ref:`RPAD <rpad>`\n+     - Pads a string on the right to a specified length using an optional fill character (default is a space).\n    * - :ref:`RTRIM <rtrim>`\n      - Strips whitespaces from the right.\n    * - :ref:`SPLIT_PART <split_part>`\n@@ -346,6 +350,39 @@ Returns a lowercased column.\n     # │ DD  ┆ dd        │\n     # └─────┴───────────┘\n \n+.. _lpad:\n+\n+LPAD\n+----\n+Pads a string on the left to a specified length using an optional fill character (default is a space).\n+If the string is longer than the target length it is truncated.\n+\n+**Example:**\n+\n+.. code-block:: python\n+\n+    df = pl.DataFrame({\"foo\": [\"hello\", \"hi\", \"a\", None, \"longstr\"]})\n+    df.sql(\"\"\"\n+      SELECT\n+        foo,\n+        LPAD(foo, 7) AS lpad,\n+        LPAD(foo, 7, 'x') AS lpad_x,\n+        LPAD(foo, 4, '#') AS lpad_trunc\n+      FROM self\n+    \"\"\")\n+    # shape: (5, 4)\n+    # ┌─────────┬─────────┬─────────┬────────────┐\n+    # │ foo     ┆ lpad    ┆ lpad_x  ┆ lpad_trunc │\n+    # │ ---     ┆ ---     ┆ ---     ┆ ---        │\n+    # │ str     ┆ str     ┆ str     ┆ str        │\n+    # ╞═════════╪═════════╪═════════╪════════════╡\n+    # │ hello   ┆   hello ┆ xxhello ┆ hell       │\n+    # │ hi      ┆      hi ┆ xxxxxhi ┆ ##hi       │\n+    # │ a       ┆       a ┆ xxxxxxa ┆ ###a       │\n+    # │ null    ┆ null    ┆ null    ┆ null       │\n+    # │ longstr ┆ longstr ┆ longstr ┆ long       │\n+    # └─────────┴─────────┴─────────┴────────────┘\n+\n .. _ltrim:\n \n LTRIM\n@@ -543,6 +580,39 @@ Returns the last (rightmost) `n` characters.\n     # │ jklmn ┆ mn  │\n     # └───────┴─────┘\n \n+.. _rpad:\n+\n+RPAD\n+----\n+Pads a string on the right to a specified length using an optional fill character (default is a space).\n+If the string is longer than the target length it is truncated.\n+\n+**Example:**\n+\n+.. code-block:: python\n+\n+    df = pl.DataFrame({\"foo\": [\"hello\", \"hi\", \"a\", None, \"longstr\"]})\n+    df.sql(\"\"\"\n+      SELECT\n+        foo,\n+        RPAD(foo, 7) AS rpad,\n+        RPAD(foo, 7, '-') AS rpad_dash,\n+        RPAD(foo, 4, '#') AS rpad_trunc\n+      FROM self\n+    \"\"\")\n+    # shape: (5, 4)\n+    # ┌─────────┬─────────┬───────────┬────────────┐\n+    # │ foo     ┆ rpad    ┆ rpad_dash ┆ rpad_trunc │\n+    # │ ---     ┆ ---     ┆ ---       ┆ ---        │\n+    # │ str     ┆ str     ┆ str       ┆ str        │\n+    # ╞═════════╪═════════╪═══════════╪════════════╡\n+    # │ hello   ┆ hello   ┆ hello--   ┆ hell       │\n+    # │ hi      ┆ hi      ┆ hi-----   ┆ hi##       │\n+    # │ a       ┆ a       ┆ a------   ┆ a###       │\n+    # │ null    ┆ null    ┆ null      ┆ null     