  test_files: '[{"path":"src/components/HomeDemo2/HeroBanner.lazyload.test.tsx","content":"import React from \"react\";\nimport { describe, it, expect, beforeEach, afterEach, vi } from \"vitest\";\nimport { render, cleanup } from \"@testing-library/react\";\nimport HeroBanner from \"./HeroBanner\";\nimport HeroBannerAr from \"../ar/HomeDemo2/HeroBanner\";\n\nconst CDN_BASE =\n  \"https://bnoonsa-bjftd5h4a7bae0ce.z02.azurefd.net/website/videos/\";\n\nfunction getFetchableVideoSources(container: HTMLElement) {\n  const videos = Array.from(container.querySelectorAll(\"video\"));\n  return videos\n    .map((video) => {\n      const preload = video.getAttribute(\"preload\");\n      const source = video.querySelector(\"source\");\n      const src = source?.getAttribute(\"src\") || \"\";\n      const isFetchable = src.trim().length > 0 && preload !== \"none\";\n      return { src, isFetchable };\n    })\n    .filter((entry) => entry.isFetchable)\n    .map((entry) => entry.src);\n}\n\ndescribe(\"HeroBanner video lazy loading\", () => {\n  beforeEach(() => {\n    vi.useFakeTimers();\n  });\n\n  afterEach(() => {\n    cleanup();\n    vi.useRealTimers();\n  });\n\n  it(\"loads only current and next English banner videos from the CDN\", () => {\n    const { container } = render(<HeroBanner />);\n    const videoSources = getFetchableVideoSources(container);\n\n    expect(videoSources).toHaveLength(2);\n    expect(videoSources.every((src) => src.startsWith(CDN_BASE))).toBe(true);\n  });\n\n  it(\"loads only current and next Arabic banner videos from the CDN\", () => {\n    const { container } = render(<HeroBannerAr />);\n    const videoSources = getFetchableVideoSources(container);\n\n    expect(videoSources).toHaveLength(2);\n    expect(videoSources.every((src) => src.startsWith(CDN_BASE))).toBe(true);\n  });\n});\n"},{"path":"src/next-config.headers.test.ts","content":"import { describe, it, expect } from \"vitest\";\n\nasync function loadNextConfig() {\n  const module = await import(\"../next.config.js\");\n  return (module as { default?: unknown }).default ?? module;\n}\n\ndescribe(\"next.config headers\", () => {\n  it(\"adds cache-control headers for images, static assets, and health API\", async () => {\n    const nextConfig = (await loadNextConfig()) as {\n      headers?: () => Promise<\n        { source: string; headers: { key: string; value: string }[] }[]\n      >;\n    };\n\n    const headers = await nextConfig.headers?.();\n    expect(headers).toBeDefined();\n\n    const imageHeader = headers?.find((entry) => entry.source === \"/images/:path*\");\n    const staticHeader = headers?.find(\n      (entry) => entry.source === \"/_next/static/:path*\"\n    );\n    const healthHeader = headers?.find((entry) => entry.source === \"/api/health\");\n\n    expect(imageHeader?.headers).toContainEqual({\n      key: \"Cache-Control\",\n      value: \"public, max-age=2592000, immutable\",\n    });\n    expect(staticHeader?.headers).toContainEqual({\n      key: \"Cache-Control\",\n      value: \"public, max-age=31536000, immutable\",\n    });\n    expect(healthHeader?.headers).toContainEqual({\n      key: \"Cache-Control\",\n      value: \"no-cache, no-store, must-revalidate\",\n    });\n  });\n});\n"}]'
