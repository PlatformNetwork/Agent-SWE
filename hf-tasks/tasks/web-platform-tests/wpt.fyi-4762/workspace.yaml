prompt: Validate triage URL inputs so that only strings that look like valid URLs are accepted. Prevent malformed entries (e.g., missing scheme) from being saved, to avoid errors when triage metadata is processed.
original_pr_body: "web-platform-tests/wpt.fyi (#4762): Verify that triage URLs are actually URLs.\n\nIt's easy as a tirager to type a malformed URL into the URL field, i.e. crbug.com/123, when triaging failures. This adds logic to check that the provided URL string at least looks like a valid URL, to avoid YAML errors etc once the triage results makes it into the metadata.\r\n"
