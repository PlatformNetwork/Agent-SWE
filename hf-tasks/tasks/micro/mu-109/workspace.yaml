prompt: Fix the places search so it no longer times out, supports larger search radii,
  offers consistent sorting, and improves map link behavior. Ensure the search waits
  long enough for the external Overpass API to respond. Allow users to search up to
  50km and provide radius options that include 10km, 25km, and 50km. Add a sort option
  to order results by distance or name and surface the active sort in the results
  summary. Update map links so the label is generic (“View on Map”) and the generated
  view and directions URLs include the business name along with coordinates to resolve
  the correct place.
original_pr_body: "micro/mu (#109): Fix places search: timeout, larger radius, sort\
  \ order, improved map links\n\nPlaces search was erroring due to an HTTP client\
  \ timeout (15s) shorter than the Overpass API's server-side query timeout (`[timeout:25]`),\
  \ causing the client to abort before a response arrived. Radius was also capped\
  \ at 5km, too small for urban use cases like finding a cinema that requires transit.\n\
  \n## Changes\n\n- **Timeout**: `httpClient` timeout raised from `15s` → `35s` to\
  \ outlast Overpass's 25s query execution window\n- **Radius**: Max increased from\
  \ `5km` → `50km` in both `handleSearch` and `handleNearby`; UI dropdown gains 10km\
  \ / 25km / 50km options\n- **Sort order**: Added sort dropdown (`distance` / `name`)\
  \ to search form; applied via extracted `sortPlaces()` helper in both handlers;\
  \ result count line shows active sort\n- **Map links**:\n  - Label changed from\
  \ `\"View on Google Maps\"` → `\"View on Map\"`\n  - Business name now included\
  \ in both view and directions URLs so Google Maps resolves the correct place:\n\
  \    ```\n    https://maps.google.com/?q=Business+Name+lat,lon\n    https://www.google.com/maps/dir/?api=1&destination=Business+Name&destination_latlng=lat,lon\n\
  \    ```\n\n<!-- START COPILOT CODING AGENT TIPS -->\n---\n\n\U0001F4AC We'd love\
  \ your input! Share your thoughts on Copilot coding agent in our [2 minute survey](https://gh.io/copilot-coding-agent-survey).\n"
