n-    def perf_counter_ns() -> int:\n-        return int(perf_counter() * NS_IN_SECOND)\n-\n-\n-try:\n-    from datetime import UTC, datetime  # type: ignore[attr-defined]\n-\n-    def utc_now():\n-        return datetime.now(UTC)\n-\n-except ImportError:\n-    from datetime import datetime, timezone\n-\n-    def utc_now():\n-        return datetime.now(timezone.utc)\n-\n-\n-TIMESTAMP_FORMAT = \"%Y-%m-%dT%H:%M:%S.%fZ\"\n-\n-\n-class ApolloTracingExtension(Extension):\n-    def __init__(self, trace_default_resolver: bool = False) -> None:\n-        self.trace_default_resolver = trace_default_resolver\n-        self.start_date: datetime | None = None\n-        self.start_timestamp: int = 0\n-        self.resolvers: list[dict] = []\n-\n-        self._totals = None\n-\n-    def request_started(self, context: ContextValue):\n-        self.start_date = utc_now()\n-        self.start_timestamp = perf_counter_ns()\n-\n-    def resolve(self, next_: Resolver, obj: Any, info: GraphQLResolveInfo, **kwargs):\n-        if not should_trace(info, self.trace_default_resolver):\n-            return next_(obj, info, **kwargs)\n-\n-        if iscoroutinefunction(next_):\n-            return self.resolve_async(next_, obj, info, **kwargs)\n-\n-        return self.resolve_sync(next_, obj, info, **kwargs)\n-\n-    async def resolve_async(\n-        self, next_: Resolver, obj: Any, info: GraphQLResolveInfo, **kwargs\n-    ):\n-        start_timestamp = perf_counter_ns()\n-        record = {\n-            \"path\": format_path(info.path),\n-            \"parentType\": str(info.parent_type),\n-            \"fieldName\": info.field_name,\n-            \"returnType\": str(info.return_type),\n-            \"startOffset\": start_timestamp - self.start_timestamp,\n-        }\n-        self.resolvers.append(record)\n-        try:\n-            result = next_(obj, info, **kwargs)\n-            if is_awaitable(result):\n-                result = await result\n-            return result\n-        finally:\n-            end_timestamp = perf_counter_ns()\n-            record[\"duration\"] = end_timestamp - start_timestamp\n-\n-    def resolve_sync(\n-        self, next_: Resolver, obj: Any, info: GraphQLResolveInfo, **kwargs\n-    ):\n-        start_timestamp = perf_counter_ns()\n-        record = {\n-            \"path\": format_path(info.path),\n-            \"parentType\": str(info.parent_type),\n-            \"fieldName\": info.field_name,\n-            \"returnType\": str(info.return_type),\n-            \"startOffset\": start_timestamp - self.start_timestamp,\n-        }\n-        self.resolvers.append(record)\n-        try:\n-            result = next_(obj, info, **kwargs)\n-            return result\n-        finally:\n-            end_timestamp = perf_counter_ns()\n-            record[\"duration\"] = end_timestamp - start_timestamp\n-\n-    def get_totals(self):\n-        if self._totals is None:\n-            self._totals = self._get_totals()\n-        return self._totals\n-\n-    def _get_totals(self):\n-        return {\n-            \"start\": self.start_date,\n-            \"end\": utc_now(),\n-            \"duration\": perf_counter_ns() - self.start_timestamp,\n-            \"resolvers\": self.resolvers,\n-        }\n-\n-    def format(self, context: ContextValue):\n-        totals = self.get_totals()\n-\n-        return {\n-            \"tracing\": {\n-                \"version\": 1,\n-                \"startTime\": totals[\"start\"].strftime(TIMESTAMP_FORMAT),\n-                \"endTime\": totals[\"end\"].strftime(TIMESTAMP_FORMAT),\n-                \"duration\": totals[\"duration\"],\n-                \"execution\": {\"resolvers\": totals[\"resolvers\"]},\n-            }\n-        }\ndiff --git a/ariadne/contrib/tracing/opentracing.py b/ariadne/contrib/tracing/opentracing.py\ndeleted file mode 100644\nindex 0dd2098..0000000\n--- a/ariadne/contrib/tracing/opentracing.py\n+++ /dev/null\n@@ -1,132 +0,0 @@\n-from collections.abc import Callable\n-from functools import partial\n-from inspect import iscoroutinefunction\n-from typing import Any\n-\n-from graphql import GraphQLResolveInfo\n-from graphql.pyutils import is_awaitable\n-from opentracing import (  # type: ignore[import-untyped]\n-    Scope,\n-    Span,\n-    Tracer,\n-    global_tracer,\n-)\n-from opentracing.ext import tags  # type: ignore[import-untyped]\n-\n-from ...types import ContextValue, Extension, Resolver\n-from .utils import copy_args_for_tracing, format_path, should_trace\n-\n-ArgFilter = Callable[[dict[str, Any], GraphQLResolveInfo], dict[str, Any]]\n-RootSpanName = str | Callable[[ContextValue], str]\n-\n-\n-class OpenTracingExtension(Extension):\n-    _arg_filter: ArgFilter | None\n-    _root_scope: Scope\n-    _root_span_name: RootSpanName | None\n-    _tracer: Tracer\n-\n-    def __init__(\n-        self,\n-        *,\n-        arg_filter: ArgFilter | None = None,\n-        root_span_name: RootSpanName | None = None,\n-    ) -> None:\n-        self._arg_filter = arg_filter\n-        self._root_span_name = root_span_name\n-        self._tracer = global_tracer()\n-\n-    def request_started(self, context: ContextValue):\n-        if self._root_span_name:\n-            if callable(self._root_span_name):\n-                root_span_name = self._root_span_name(context)\n-            else:\n-                root_span_name = self._root_span_name\n-        else:\n-            root_span_name = \"GraphQL Operation\"\n-\n-        self._root_scope = self._tracer.start_active_span(root_span_name)\n-        self._root_scope.span.set_tag(tags.COMPONENT, \"GraphQL\")\n-\n-    def request_finished(self, context: ContextValue):\n-        self._root_scope.close()\n-\n-    def resolve(\n-        self, next_: Resolver, obj: Any, info: GraphQLResolveInfo, **kwargs\n-    ) -> Any:\n-        if not should_trace(info):\n-            return next_(obj, info, **kwargs)\n-\n-        graphql_path = \".\".join(map(str, format_path(info.path)))\n-\n-        with self._tracer.start_active_span(info.field_name) as scope:\n-            span = scope.span\n-            span.set_tag(tags.COMPONENT, \"GraphQL\")\n-\n-            if info.operation.name:\n-                span.set_tag(\"graphql.operation.name\", info.operation.name.value)\n-            else:\n-                span.set_tag(\"graphql.operation.name\", \"GraphQL Operation\")\n-\n-            span.set_tag(\"graphql.parentType\", info.parent_type.name)\n-            span.set_tag(\"graphql.path\", graphql_path)\n-\n-            if kwargs:\n-                filtered_kwargs = self.filter_resolver_args(kwargs, info)\n-                for key, value in filtered_kwargs.items():\n-                    span.set_tag(f\"graphql.arg[{key}]\", value)\n-\n-            if iscoroutinefunction(next_):\n-                return self.resolve_async(span, next_, obj, info, **kwargs)\n-\n-            return self.resolve_sync(span, next_, obj, info, **kwargs)\n-\n-    async def resolve_async(\n-        self, span: Span, next_: Resolver, obj: Any, info: GraphQLResolveInfo, **kwargs\n-    ) -> Any:\n-        with self._tracer.start_active_span(\"resolve async\", child_of=span):\n-            result = next_(obj, info, **kwargs)\n-            if is_awaitable(result):\n-                with self._tracer.start_active_span(\"await result\"):\n-                    return await result\n-            return result\n-\n-    def resolve_sync(\n-        self, span: Span, next_: Resolver, obj: Any, info: GraphQLResolveInfo, **kwargs\n-    ) -> Any:\n-        with self._tracer.start_active_span(\"resolve sync\", child_of=span) as scope:\n-            result = next_(obj, info, **kwargs)\n-\n-            if is_awaitable(result):\n-\n-                async def await_sync_result():\n-                    with self._tracer.start_active_span(\n-                        \"await result\", child_of=scope.span\n-                    ):\n-                        return await result\n-\n-                return await_sync_result()\n-\n-            return result\n-\n-    def filter_resolver_args(\n-        self, args: dict[str, Any], info: GraphQLResolveInfo\n-    ) -> dict[str, Any]:\n-        args_to_trace = copy_args_for_tracing(args)\n-\n-        if not self._arg_filter:\n-            return args_to_trace\n-\n-        return self._arg_filter(args_to_trace, info)\n-\n-\n-def opentracing_extension(\n-    *,\n-    arg_filter: ArgFilter | None = None,\n-    root_span_name: RootSpanName | None = None,\n-):\n-    return partial(\n-        OpenTracingExtension,\n-        arg_filter=arg_filter,\n-        root_span_name=root_span_name,\n-    )\ndiff --git a/benchmark/test_extensions.py b/benchmark/test_extensions.py\nindex 7278380..caa7491 100644\n--- a/benchmark/test_extensions.py\n+++ b/benchmark/test_extensions.py\n@@ -5,7 +5,6 @@ from starlette.testclient import TestClient\n from ariadne.asgi import GraphQL\n from ariadne.asgi.handlers import GraphQLHTTPHandler\n from ariadne.contrib.tracing.opentelemetry import OpenTelemetryExtension\n-from ariadne.contrib.tracing.opentracing import OpenTracingExtension\n from ariadne.types import Extension\n \n from .schema import schema\n@@ -71,25 +70,3 @@ def test_query_with_open_telemetry_extension(benchmark, benchmark_query):\n     result = benchmark(api_call)\n     assert result.status_code == HTTPStatus.OK\n     assert not result.json().get(\"errors\")\n-\n-\n-def test_query_with_open_tracing_extension(benchmark, benchmark_query):\n-    app = GraphQL(\n-        schema,\n-        http_handler=GraphQLHTTPHandler(extensions=[OpenTracingExtension]),\n-    )\n-\n-    client = TestClient(app)\n-\n-    def api_call():\n-        return client.post(\n-            \"/\",\n-            json={\n-                \"operationName\": \"GetThreads\",\n-                \"query\": benchmark_query,\n-            },\n-        )\n-\n-    result = benchmark(api_call)\n-    assert result.status_code == HTTPStatus.OK\n-    assert not result.json().get(\"errors\")\ndiff --git a/docs/02-Monitoring/02-open-tracing.md b/docs/02-Monitoring/02-open-tracing.md\ndeleted file mode 100644\nindex e1c2b4b..0000000\n--- a/docs/02-Monitoring/02-open-tracing.md\n+++ /dev/null\n@@ -1,131 +0,0 @@\n----\n-id: open-tracing\n-title: OpenTracing\n----\n-\n-> **Deprecation notice:** OpenTracing standard was superseded by [OpenTelemetry](./open-telemetry) and is considered deprecated. OpenTracing extension will be delete in a future version of Ariadne.\n-\n-Ariadne provides an extension that implements the [OpenTracing](https://opentracing.io/) specification, making it easy to monitor GraphQL API performance and errors using popular APM tools like [Datadog](https://www.datadoghq.com/) or [Jaeger](https://www.jaegertracing.io/).\n-\n-> **Note:** for performance reasons OpenTracing extension excludes default resolvers.\n-\n-\n-## Enabling OpenTracing in the API\n-\n-To enable OpenTracing in your API, import the `OpenTracingExtension` class from `ariadne.contrib.tracing.opentracing` and pass it to your server `extensions` option:\n-\n-```python\n-from ariadne.asgi import GraphQL\n-from ariadne.asgi.handlers import GraphQLHTTPHandler\n-from ariadne.contrib.tracing.opentracing import OpenTracingExtension\n-\n-app = GraphQL(\n-    schema,\n-    debug=True,\n-    http_handler=GraphQLHTTPHandler(\n-        extensions=[OpenTracingExtension],\n-    ),\n-)\n-```\n-\n-> **Note:** If you don't have OpenTracing already configured in your project, you will need to install the [`opentracing-python`](https://github.com/opentracing/opentracing-python) package and [configure tracer](https://opentracing.io/guides/python/tracers/) for your APM solution.\n-\n-\n-## Configuration options\n-\n-The `ariadne.contrib.tracing.opentracing` module exports `opentracing_extension` utility function that can be used to setup `OpenTracingExtension` with custom options:\n-\n-\n-### Filtering sensitive arguments data\n-\n-By default all arguments field was resolved with are sent to the APM service. If your API fields have arguments for sensitive data like passwords or tokens, you will need to filter those before sending tracking data to the service.\n-\n-`OpenTracingExtension` has configuration option named `arg_filter` which accepts a function that extension will call with the copy of the dict of arguments previously passed to field's resolver.\n-\n-Here is an example defining custom filtering function named `my_arg_filter` and using `opentracing_extension` to setup OpenTracing with it:\n-\n-```python\n-from ariadne.asgi import GraphQL\n-from ariadne.asgi.handlers import GraphQLHTTPHandler\n-from ariadne.contrib.tracing import opentracing_extension\n-\n-def my_arg_filter(args, info):\n-    if \"password\" in args:\n-        args[\"password\"] = \"[redacted]\"\n-    if \"secret\" in args:\n-        args[\"secret\"] = \"[redacted]\"\n-    for key, value in args.items():\n-        if isinstance(value, dict):\n-            args[key] = my_arg_filter(value)\n-        if isinstance(value, list):\n-            args[key] = [my_arg_filter(v) for v in value]\n-    return args\n-\n-\n-schema = make_executable_schema(type_def, [query, mutation])\n-app = GraphQL(\n-    schema,\n-    debug=True,\n-    extensions=[\n-        opentracing_extension(arg_filter=my_arg_filter),\n-    ],\n-    http_handler=GraphQLHTTPHandler(\n-        extensions=[\n-            opentracing_extension(arg_filter=my_arg_filter),\n-        ],\n-    ),\n-)\n-```\n-\n-\n-### Customizing root span name\n-\n-Ariadne uses `GraphQL Operation` for root span's name. You can customize this name using the `root_span_name` option:\n-\n-```python\n-from ariadne.asgi import GraphQL\n-from ariadne.asgi.handlers import GraphQLHTTPHandler\n-from ariadne.contrib.tracing import opentracing_extension\n-\n-\n-schema = make_executable_schema(type_def, [query, mutation])\n-app = GraphQL(\n-    schema,\n-    debug=True,\n-    extensions=[\n-        opentracing_extension(arg_filter=my_arg_filter),\n-    ],\n-    http_handler=GraphQLHTTPHandler(\n-        extensions=[\n-            opentracing_extension(root_span_name=\"Admin GraphQL\"),\n-        ],\n-    ),\n-)\n-```\n-\n-You can also have a dynamic name by passing a function to the `root_span_name`:\n-\n-```python\n-from ariadne.asgi import GraphQL\n-from ariadne.asgi.handlers import GraphQLHTTPHandler\n-from ariadne.contrib.tracing import opentracing_extension\n-\n-\n-def get_root_span_name(context) -> str:\n-    return context.get(\"operationName\") or \"GraphQL Mutation\"\n-\n-\n-schema = make_executable_schema(type_def, [query, mutation])\n-app = GraphQL(\n-    schema,\n-    debug=True,\n-    extensions=[\n-        opentracing_extension(arg_filter=my_arg_filter),\n-    ],\n-    http_handler=GraphQLHTTPHandler(\n-        extensions=[\n-            opentracing_extension(root_span_name=get_root_span_name),\n-        ],\n-    ),\n-)\n-```\ndiff --git a/docs/02-Monitoring/03-apollo-tracing.md b/docs/02-Monitoring/03-apollo-tracing.md\ndeleted file mode 100644\nindex f9d8d30..0000000\n--- a/docs/02-Monitoring/03-apollo-tracing.md\n+++ /dev/null\n@@ -1,53 +0,0 @@\n----\n-id: apollo-tracing\n-title: Apollo Tracing\n----\n-\n-> **Deprecation notice:** Apollo Tracing has been deprecated and will be removed in a future version of Ariadne.\n-\n-[Apollo Tracing](https://blog.apollographql.com/exposing-trace-data-for-your-graphql-server-with-apollo-tracing-97c5dd391385) exposes basic performance data of GraphQL queries: Query execution time and execution time of individual resolvers. Ariadne has GraphQL extension that includes this data in the JSON returned by the server after completing the query.\n-\n-> **Note:** for performance reasons Apollo Tracing extension excludes default resolvers.\n-\n-\n-## Enabling Apollo Tracing in the API\n-\n-To enable Apollo Tracing in your API, import the `ApolloTracingExtension` class from `ariadne.contrib.tracing.apollotracing` and pass it to your server `extensions` option:\n-\n-```python\n-from ariadne.asgi import GraphQL\n-from ariadne.asgi.handlers import GraphQLHTTPHandler\n-from ariadne.contrib.tracing.apollotracing import ApolloTracingExtension\n-\n-app = GraphQL(\n-    schema,\n-    debug=True,\n-    http_handler=GraphQLHTTPHandler(\n-        extensions=[ApolloTracingExtension],\n-    ),\n-)\n-```\n-\n-\n-## Tracing default resolvers\n-\n-For performance reasons tracing is disabled for default resolvers. To reverse this behavior you can initialize `ApolloTracingExtension` with `trace_default_resolver` option set to `True`:\n-\n-```python\n-from ariadne.asgi import GraphQL\n-from ariadne.asgi.handlers import GraphQLHTTPHandler\n-from ariadne.contrib.tracing.apollotracing import ApolloTracingExtension\n-\n-\n-def apollo_tracing():\n-    return ApolloTracingExtension(trace_default_resolver=True)\n-\n-\n-app = GraphQL(\n-    schema,\n-    debug=True,\n-    http_handler=GraphQLHTTPHandler(\n-        extensions=[apollo_tracing],\n-    ),\n-)\n-```\n\\ No newline at end of file\ndiff --git a/pyproject.toml b/pyproject.toml\nindex 31d6250..d82e47b 100644\n--- a/pyproject.toml\n+++ b/pyproject.toml\n@@ -43,14 +43,12 @@ test = [\n   \"syrupy\",\n   \"werkzeug\",\n   \"httpx\",\n-  \"opentracing\",\n   \"opentelemetry-api\",\n   \"python-multipart>=0.0.13\",\n   \"aiodataloader\",\n   \"graphql-sync-dataloaders;python_version>\\\"3.7\\\"\",\n ]\n asgi-file-uploads = [\"python-multipart>=0.0.13\"]\n-tracing = [\"opentracing\"]\n telemetry = [\"opentelemetry-api\"]\n \n [project.urls]\ndiff --git a/tests/asgi/conftest.py b/tests/asgi/conftest.py\nindex de3809d..6c08db8 100644\n--- a/tests/asgi/conftest.py\n+++ b/tests/asgi/conftest.py\n@@ -7,7 +7,7 @@ from ariadne.asgi.handlers import (\n     GraphQLTransportWSHandler,\n     GraphQLWSHandler,\n )\n-from ariadne.contrib.tracing.opentracing import opentracing_extension\n+from ariadne.contrib.tracing.opentelemetry import opentelemetry_extension\n \n \n @pytest.fixture\n@@ -33,7 +33,7 @@ def app_with_tracing(schema):\n   