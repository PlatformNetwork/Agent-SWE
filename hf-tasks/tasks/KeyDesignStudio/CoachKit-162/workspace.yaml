prompt: Add explainability metadata to session blueprints so users can understand why a plan was generated. Support multiple session variants and enforce guardrails around key sessions, including a budget for how many can appear and rules that prevent stacking or problematic sequencing. Strengthen validation so consecutive high-intensity sessions and long+hard combinations are constrained according to plan rules.
original_pr_body: |-
  KeyDesignStudio/CoachKit (#162): feat(apb phase-a): explainable session blueprints + key-session guardrails

  Phase A foundation for coach-thinking AI planning. Adds explainability fields, session variants, key-session budget guardrails, anti-stacking rules, and stronger constraint validation for consecutive intensity/long+hard sequencing.
