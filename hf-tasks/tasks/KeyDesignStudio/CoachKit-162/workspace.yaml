  test_files: '[{"path":"apps/web/modules/ai-plan-builder/tests/ai-plan-builder.constraint-guardrails.unit.test.ts","content":"import { describe, expect, it } from ''vitest'';\n\nimport { validateDraftPlanAgainstSetup } from ''@/modules/ai-plan-builder/rules/constraint-validator'';\nimport type { DraftPlanV1, DraftPlanSetupV1 } from ''@/modules/ai-plan-builder/rules/draft-generator'';\n\nfunction buildSetup(overrides: Partial<DraftPlanSetupV1> = {}): DraftPlanSetupV1 {\n  return {\n    weekStart: ''monday'',\n    startDate: ''2026-01-05'',\n    eventDate: ''2026-04-05'',\n    weeksToEvent: 12,\n    weeklyAvailabilityDays: [0, 1, 2, 3, 4, 5, 6],\n    weeklyAvailabilityMinutes: 0,\n    disciplineEmphasis: ''balanced'',\n    riskTolerance: ''med'',\n    maxIntensityDaysPerWeek: 3,\n    maxDoublesPerWeek: 1,\n    longSessionDay: 6,\n    coachGuidanceText: ''Experienced athlete ready for volume.'',\n    ...overrides,\n  };\n}\n\nfunction buildDraft(sessions: DraftPlanV1[''weeks''][number][''sessions''], setupOverrides: Partial<DraftPlanSetupV1> = {}) {\n  return {\n    version: ''v1'',\n    setup: buildSetup(setupOverrides),\n    weeks: [{ weekIndex: 0, locked: false, sessions }],\n  } satisfies DraftPlanV1;\n}\n\ndescribe(''constraint-validator guardrails'', () => {\n  it(''flags consecutive intensity days'', () => {\n    const draft = buildDraft([\n      { weekIndex: 0, ordinal: 0, dayOfWeek: 2, discipline: ''run'', type: ''tempo'', durationMinutes: 50, locked: false },\n      { weekIndex: 0, ordinal: 1, dayOfWeek: 3, discipline: ''bike'', type: ''threshold'', durationMinutes: 55, locked: false },\n      { weekIndex: 0, ordinal: 2, dayOfWeek: 5, discipline: ''swim'', type: ''endurance'', durationMinutes: 40, locked: false },\n    ]);\n\n    const violations = validateDraftPlanAgainstSetup({ setup: draft.setup, draft });\n    expect(violations.some((v) => v.code === (''CONSECUTIVE_INTENSITY_DAYS'' as any))).toBe(true);\n  });\n\n  it(''flags long session followed by intensity'', () => {\n    const draft = buildDraft([\n      {\n        weekIndex: 0,\n        ordinal: 0,\n        dayOfWeek: 5,\n        discipline: ''run'',\n        type: ''endurance'',\n        durationMinutes: 90,\n        notes: ''Long run progression'',\n        locked: false,\n      },\n      {\n        weekIndex: 0,\n        ordinal: 1,\n        dayOfWeek: 6,\n        discipline: ''bike'',\n        type: ''threshold'',\n        durationMinutes: 60,\n        locked: false,\n      },\n    ]);\n\n    const violations = validateDraftPlanAgainstSetup({ setup: draft.setup, draft });\n    expect(violations.some((v) => v.code === (''LONG_SESSION_FOLLOWED_BY_INTENSITY'' as any))).toBe(true);\n  });\n\n  it(''enforces key session count bounds'', () => {\n    const draft = buildDraft([\n      {\n        weekIndex: 0,\n        ordinal: 0,\n        dayOfWeek: 1,\n        discipline: ''run'',\n        type: ''endurance'',\n        durationMinutes: 50,\n        notes: ''Key session aerobic focus'',\n        locked: false,\n      },\n      {\n        weekIndex: 0,\n        ordinal: 1,\n        dayOfWeek: 3,\n        discipline: ''bike'',\n        type: ''endurance'',\n        durationMinutes: 70,\n        notes: ''Long ride steady'',\n        locked: false,\n      },\n      {\n        weekIndex: 0,\n        ordinal: 2,\n        dayOfWeek: 5,\n        discipline: ''run'',\n        type: ''endurance'',\n        durationMinutes: 45,\n        notes: ''Key session hills'',\n        locked: false,\n      },\n      {\n        weekIndex: 0,\n        ordinal: 3,\n        dayOfWeek: 0,\n        discipline: ''bike'',\n        type: ''endurance'',\n        durationMinutes: 65,\n        notes: ''Brick simulation'',\n        locked: false,\n      },\n    ]);\n\n    const violations = validateDraftPlanAgainstSetup({ setup: draft.setup, draft });\n    expect(violations.some((v) => v.code === (''KEY_SESSION_COUNT_OUT_OF_BOUNDS'' as any))).toBe(true);\n  });\n});\n"},{"path":"apps/web/modules/ai-plan-builder/tests/workout-detail-renderer.explainability.unit.test.ts","content":"import { describe, expect, it } from ''vitest'';\n\nimport { renderWorkoutDetailFromSessionDetailV1 } from ''@/lib/workoutDetailRenderer'';\n\nconst baseDetail = {\n  objective: ''Easy run (45 min)'',\n  structure: [\n    { blockType: ''warmup'', durationMinutes: 10, steps: ''Easy jog.'' },\n    { blockType: ''main'', durationMinutes: 25, steps: ''Comfortable steady effort.'' },\n    { blockType: ''cooldown'', durationMinutes: 10, steps: ''Relaxed finish.'' },\n  ],\n  targets: { primaryMetric: ''RPE'', notes: ''Stay relaxed.'' },\n};\n\ndescribe(''workout detail rendering explainability'', () => {\n  it(''renders purpose and explainability blocks with spacing'', () => {\n    const detail = {\n      ...baseDetail,\n      purpose: ''Reset legs after travel.'',\n      explainability: {\n        whyThis: ''Build aerobic durability.'',\n        whyToday: ''Fits between harder days.'',\n        ifMissed: ''Replace with short walk.'',\n        ifCooked: ''Swap for recovery spin.'',\n      },\n    } as any;\n\n    const rendered = renderWorkoutDetailFromSessionDetailV1(detail as any);\n    expect(rendered).toBe(\n      [\n        ''Easy run'',\n        ''Reset legs after travel.'',\n        '''',\n        ''WARMUP: 10 min – Easy jog.'',\n        ''MAIN: 25 min – Comfortable steady effort.'',\n        ''COOLDOWN: 10 min – Relaxed finish.'',\n        '''',\n        ''WHY THIS: Build aerobic durability.'',\n        ''WHY TODAY: Fits between harder days.'',\n        ''IF MISSED: Replace with short walk.'',\n        ''IF COOKED: Swap for recovery spin.'',\n      ].join(''\\n'')\n    );\n  });\n\n  it(''omits empty purpose and explainability sections'', () => {\n    const detail = {\n      ...baseDetail,\n      purpose: ''   '',\n      explainability: {\n        whyThis: ''  '',\n        whyToday: '''',\n      },\n    } as any;\n\n    const rendered = renderWorkoutDetailFromSessionDetailV1(detail as any);\n    expect(rendered).toBe(\n      [\n        ''Easy run'',\n        '''',\n        ''WARMUP: 10 min – Easy jog.'',\n        ''MAIN: 25 min – Comfortable steady effort.'',\n        ''COOLDOWN: 10 min – Relaxed finish.'',\n      ].join(''\\n'')\n    );\n  });\n});\n"}]'
